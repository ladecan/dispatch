<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배차 메시지 매니저 PRO</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           [1. 글로벌 스타일 및 테마 변수]
           ==================================================
        */
        :root {
            --primary-navy: #1a1a2e;       /* 메인 네이비 */
            --point-red: #e94560;          /* 포인트 레드 */
            --soft-blue: #0f3460;          /* 서브 블루 */
            --bg-color: #eef1f8;           /* 배경색 */
            --card-bg: #ffffff;            /* 카드 배경 */
            --input-fill: #f7f8fc;         /* 입력창 배경 */
            --border-line: #e2e5ef;        /* 경계선 색상 */
            --text-dark: #1a1a2e;          /* 메인 텍스트 */
            --text-gray: #7b8196;          /* 서브 텍스트 */
            --green-light: #d1fae5;        /* 하차지 포인트 */
            --yellow-light: #fff3cd;       /* 상차지 포인트 */
            --shadow-standard: 0 4px 20px rgba(26, 26, 46, 0.08);
            --shadow-hover: 0 8px 30px rgba(26, 26, 46, 0.12);
        }

        /* 기본 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 50px 20px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================================================
           [2. 레이아웃 컨테이너]
           ==================================================
        */
        .main-wrapper {
            max-width: 950px;
            margin: 0 auto;
        }

        /* 상단 헤더 섹션 */
        .app-header {
            display: flex;
            align-items: center;
            margin-bottom: 45px;
            gap: 25px;
            animation: fadeInDown 0.6s ease-out;
        }

        .icon-container {
            width: 70px;
            height: 70px;
            background-color: var(--primary-navy);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(26, 26, 46, 0.2);
        }

        .title-group h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary-navy);
            margin-bottom: 5px;
        }

        .title-group p {
            color: var(--text-gray);
            font-size: 16px;
            font-weight: 400;
        }

        /* ==================================================
           [3. 카드 패널 시스템]
           ==================================================
        */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* 반응형 모바일 대응 */
        @media (max-width: 850px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .ui-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 35px;
            border: 1px solid var(--border-line);
            box-shadow: var(--shadow-standard);
            transition: all 0.3s ease;
        }

        .ui-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        /* 카드 제목 라벨 */
        .card-label {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1.5px solid #f0f0f5;
        }

        .label-circle {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
        }

        .label-up { background-color: var(--yellow-light); color: #b45309; }
        .label-down { background-color: var(--green-light); color: #065f46; }

        .label-title {
            margin-left: 15px;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-navy);
        }

        /* ==================================================
           [4. 입력 필드 및 폼 디자인]
           ==================================================
        */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-gray);
            margin-bottom: 10px;
            padding-left: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-line);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            background-color: var(--input-fill);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            color: var(--text-dark);
        }

        .input-group input:focus {
            border-color: var(--point-red);
            background-color: #ffffff;
            box-shadow: 0 0 0 6px rgba(233, 69, 96, 0.08);
        }

        /* 읽기 전용/확정된 주소 필드 */
        .input-group input[readonly] {
            border-color: #2ecc71;
            background-color: #f0fdf4;
            color: #15803d;
            font-weight: 600;
            cursor: default;
        }

        /* ==================================================
           [5. 장소 검색 드롭다운 결과]
           ==================================================
        */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(26, 26, 46, 0.18);
            z-index: 9999;
            margin-top: 10px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border-line);
        }

        .search-dropdown.visible {
            display: block;
            animation: slideInUp 0.3s ease;
        }

        .dropdown-row {
            padding: 18px 25px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f9;
            transition: background 0.2s;
        }

        .dropdown-row:last-child {
            border-bottom: none;
        }

        .dropdown-row:hover {
            background-color: #f4f7ff;
        }

        .row-place-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary-navy);
            margin-bottom: 4px;
        }

        .row-address-name {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.4;
        }

        /* ==================================================
           [6. 지도 출력 영역]
           ==================================================
        */
        .map-display {
            width: 100%;
            height: 220px;
            border-radius: 18px;
            border: 2px solid var(--border-line);
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }

        .map-display.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        /* ==================================================
           [7. 추가 정보 영역 (하단)]
           ==================================================
        */
        .extra-info-row {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border-line);
            box-shadow: var(--shadow-standard);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 600px) {
            .extra-info-row {
                grid-template-columns: 1fr;
            }
        }

        /* ==================================================
           [8. 결과 및 복사 섹션]
           ==================================================
        */
        .btn-build {
            width: 100%;
            padding: 22px;
            background-color: var(--point-red);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-build:hover {
            transform: translateY(-5px);
            background-color: #d63651;
            box-shadow: 0 15px 35px rgba(233, 69, 96, 0.4);
        }

        .btn-build:active {
            transform: translateY(-1px);
        }

        .result-container {
            margin-top: 40px;
            background-color: var(--primary-navy);
            border-radius: 30px;
            padding: 40px;
            animation: fadeInUp 0.8s ease;
        }

        .result-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .result-top h2 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-copy {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .btn-copy.success {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        .text-output {
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            color: #f1f3f9;
            font-family: 'Noto Sans KR', monospace;
            font-size: 16px;
            line-height: 1.9;
            resize: none;
            outline: none;
        }

        /* 담당자 하단 전화번호 힌트 */
        .manager-hint {
            font-size: 13px;
            color: var(--point-red);
            font-weight: 700;
            margin-top: 8px;
            min-height: 22px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ==================================================
           [9. 애니메이션 키프레임]
           ==================================================
        */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="main-wrapper">
    <header class="app-header">
        <div class="icon-container">🚚</div>
        <div class="title-group">
            <h1>배차 정보 생성 매니저</h1>
            <p>상하차지 정보를 검색하고 카카오톡/문자용 메시지를 생성합니다.</p>
        </div>
    </header>

    <div class="content-grid">
        
        <section class="ui-card">
            <div class="card-label">
                <div class="label-circle label-up">상</div>
                <span class="label-title">상차지 설정</span>
            </div>

            <div class="input-group">
                <label>장소 명칭 검색</label>
                <input type="text" id="p_search_input" placeholder="장소명 또는 키워드 입력 (예: 용마)">
                <div id="p_search_dropdown" class="search-dropdown"></div>
            </div>

            <div class="input-group">
                <label>확정 도로명 주소</label>
                <input type="text" id="p_address_fixed" readonly placeholder="장소 검색 시 자동 매칭됩니다.">
            </div>

            <div id="p_map_container" class="map-display">
                <div id="p_kakao_map" style="width:100%; height:100%;"></div>
            </div>

            <div class="input-group" style="margin-top: 30px;">
                <label>상차 예정 일시</label>
                <input type="text" id="p_schedule_time" placeholder="예: 05/22(수) 오전 10시">
            </div>

            <div class="input-group">
                <label>현장 담당자</label>
                <input type="text" id="p_manager_name" list="global_manager_list" placeholder="성함 입력">
                <div id="p_manager_phone_hint" class="manager-hint"></div>
            </div>
        </section>

        <section class="ui-card">
            <div class="card-label">
                <div class="label-circle label-down">하</div>
                <span class="label-title">하차지 설정</span>
            </div>

            <div class="input-group">
                <label>장소 명칭 검색</label>
                <input type="text" id="d_search_input" placeholder="병원명, 건물명 등 입력">
                <div id="d_search_dropdown" class="search-dropdown"></div>
            </div>

            <div class="input-group">
                <label>확정 도로명 주소</label>
                <input type="text" id="d_address_fixed" readonly placeholder="장소 검색 시 자동 매칭됩니다.">
            </div>

            <div id="d_map_container" class="map-display">
                <div id="d_kakao_map" style="width:100%; height:100%;"></div>
            </div>

            <div class="input-group" style="margin-top: 30px;">
                <label>하차 예정 일시</label>
                <input type="text" id="d_schedule_time" placeholder="예: 05/22(수) 오후 3시">
            </div>

            <div class="input-group">
                <label>현장 담당자</label>
                <input type="text" id="d_manager_name" list="global_manager_list" placeholder="성함 입력">
                <div id="d_manager_phone_hint" class="manager-hint"></div>
            </div>
        </section>

    </div> <div class="extra-info-row">
        <div class="input-group" style="margin-bottom: 0;">
            <label>배송 장비 명칭</label>
            <input type="text" id="target_equipment" placeholder="예: Nordlys, PicoWay 등">
        </div>
        <div class="input-group" style="margin-bottom: 0;">
            <label>기사님 전달사항 (비고)</label>
            <input type="text" id="order_memo" placeholder="전달할 특이사항을 적어주세요.">
        </div>
    </div>

    <button class="btn-build" onclick="handleGenerateAction()">
        <span>✦</span> 배차 메시지 생성 및 정리하기
    </button>

    <div class="result-container">
        <div class="result-top">
            <h2>Generated Logistics Message</h2>
            <button class="btn-copy" id="final_copy_btn" onclick="executeCopy()">
                <span>📋</span> 전체 내용 복사
            </button>
        </div>
        <textarea id="final_output_area" class="text-output" readonly></textarea>
    </div>

</div> <datalist id="global_manager_list">
    <option value="김기훈">
    <option value="오상걸">
    <option value="박윤아">
    <option value="김성훈">
    <option value="이가람">
</datalist>


<script>
    /**
     * 1. 전역 데이터 설정
     */
    const MASTER_CONTACTS = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541"
    };

    const PRESET_LOCATIONS = {
        "용마": {
            display_name: "김포 용마창고",
            full_address: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            latitude: 37.6086,
            longitude: 126.7628,
            default_mgr: "김기훈"
        }
    };

    /**
     * 2. 상태 관리 객체
     */
    const kakaoSearchProvider = new kakao.maps.services.Places();
    
    let pickupState = { 
        place_name: "", 
        address: "", 
        lat: null, 
        lng: null, 
        mapObj: null, 
        markerObj: null 
    };
    
    let dropState = { 
        place_name: "", 
        address: "", 
        lat: null, 
        lng: null, 
        mapObj: null, 
        markerObj: null 
    };

    /**
     * 3. 검색 이벤트 바인딩 (초기화)
     */
    function setupSearchWorkflow(prefix, stateObj) {
        const inputEl = document.getElementById(prefix + "_search_input");
        const dropdownEl = document.getElementById(prefix + "_search_dropdown");

        inputEl.addEventListener("input", function() {
            const keyword = this.value.trim();
            
            if (!keyword) {
                dropdownEl.classList.remove("visible");
                return;
            }

            // [A] 프리셋(용마 등) 우선 매칭
            if (PRESET_LOCATIONS[keyword]) {
                const preset = PRESET_LOCATIONS[keyword];
                processSelection(prefix, preset.display_name, preset.full_address, preset.latitude, preset.longitude, stateObj);
                
                if (preset.default_mgr) {
                    document.getElementById(prefix + "_manager_name").value = preset.default_mgr;
                    refreshPhoneHint(prefix);
                }
                
                dropdownEl.classList.remove("visible");
                return;
            }

            // [B] 카카오 API 검색 요청
            kakaoSearchProvider.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    renderDropdownList(prefix, data, stateObj);
                } else {
                    dropdownEl.classList.remove("visible");
                }
            });
        });
    }

    /**
     * 4. 검색 결과 드롭다운 렌더링
     */
    function renderDropdownList(prefix, items, stateObj) {
        const dropdown = document.getElementById(prefix + "_search_dropdown");
        dropdown.innerHTML = "";

        // 최대 10개까지만 노출
        items.slice(0, 10).forEach(item => {
            // 도로명 주소(road_address_name)를 우선 순위로 채택
            const targetAddress = item.road_address_name || item.address_name;
            
            const div = document.createElement("div");
            div.className = "dropdown-row";
            div.innerHTML = `
                <div class="row-place-name">${item.place_name}</div>
                <div class="row-address-name">${targetAddress}</div>
            `;
            
            div.onclick = () => {
                processSelection(prefix, item.place_name, targetAddress, item.y, item.x, stateObj);
                dropdown.classList.remove("visible");
            };
            
            dropdown.appendChild(div);
        });
        
        dropdown.classList.add("visible");
    }

    /**
     * 5. 선택된 장소 데이터 적용 및 지도 활성화
     */
    function processSelection(prefix, name, addr, lat, lng, stateObj) {
        // 입력창 및 데이터 바인딩
        document.getElementById(prefix + "_search_input").value = name;
        document.getElementById(prefix + "_address_fixed").value = addr;
        
        stateObj.place_name = name;
        stateObj.address = addr;
        stateObj.lat = lat;
        stateObj.lng = lng;

        // 지도 컨테이너 노출
        const mapWrap = document.getElementById(prefix + "_map_container");
        mapWrap.classList.add("active");

        const targetPos = new kakao.maps.LatLng(lat, lng);
        
        // 지도 인스턴스 생성 또는 위치 업데이트
        if (!stateObj.mapObj) {
            const mapDom = document.getElementById(prefix + "_kakao_map");
            stateObj.mapObj = new kakao.maps.Map(mapDom, { center: targetPos, level: 3 });
            stateObj.markerObj = new kakao.maps.Marker({ position: targetPos, map: stateObj.mapObj });
        } else {
            stateObj.mapObj.setCenter(targetPos);
            stateObj.markerObj.setPosition(targetPos);
            // 렌더링 타이밍 이슈 방지
            setTimeout(() => stateObj.mapObj.relayout(), 200);
        }
    }

    /**
     * 6. 주소에서 '구/시' 명칭 추출 로직 (지역 기반 명칭 생성용)
     */
    function extractRegionLabel(fullAddr) {
        if (!fullAddr) return "";
        
        const addrTokens = fullAddr.split(" ");
        
        // 주소 체계 상 보통 2번째 단어가 '서초구', '강남구', '성남시' 등임
        if (addrTokens.length > 1) {
            // '구', '시', '군' 글자를 제거하여 깔끔하게 '서초', '강남'만 남김
            const rawRegion = addrTokens[1];
            return rawRegion.replace(/구$|시$|군$/, "");
        }
        
        return "";
    }

    /**
     * 7. 담당자 전화번호 힌트 출력
     */
    function refreshPhoneHint(prefix) {
        const inputName = document.getElementById(prefix + "_manager_name").value.trim();
        const hintArea = document.getElementById(prefix + "_manager_phone_hint");
        
        if (MASTER_CONTACTS[inputName]) {
            hintArea.innerHTML = `<span>📞</span> ${MASTER_CONTACTS[inputName]}`;
        } else {
            hintArea.innerHTML = "";
        }
    }

    /**
     * 8. [핵심] 메시지 빌드 프로세스
     */
    function handleGenerateAction() {
        // [입력값 취합]
        const pickupTime = document.getElementById("p_schedule_time").value.trim() || "(시간협의)";
        const dropTime = document.getElementById("d_schedule_time").value.trim() || "(시간협의)";
        const pickupMgr = document.getElementById("p_manager_name").value.trim() || "(미입력)";
        const dropMgr = document.getElementById("d_manager_name").value.trim() || "(미입력)";
        const equipName = document.getElementById("target_equipment").value.trim() || "(미입력)";
        const remarkMemo = document.getElementById("order_memo").value.trim();

        // [지역 기반 명칭 조합] 예: 서초 세예의원
        const pRegion = extractRegionLabel(pickupState.address);
        const pickupFormattedName = pRegion ? `${pRegion} ${pickupState.place_name}` : pickupState.place_name;

        const dRegion = extractRegionLabel(dropState.address);
        const dropFormattedName = dRegion ? `${dRegion} ${dropState.place_name}` : dropState.place_name;

        // [메시지 조립]
        let finalMessage = `[상차]\n`;
        finalMessage += `상차 : ${pickupFormattedName || "(장소 미선택)"}\n`;
        finalMessage += `일시 : ${pickupTime}\n`;
        finalMessage += `장비명 : ${equipName}\n`;
        finalMessage += `주소 : ${pickupState.address || "(주소 미선택)"}\n`;
        finalMessage += `담당자 : ${pickupMgr}`;
        if (MASTER_CONTACTS[pickupMgr]) finalMessage += ` (${MASTER_CONTACTS[pickupMgr]})`;

        finalMessage += `\n\n[하차]\n`;
        finalMessage += `하차 : ${dropFormattedName || "(장소 미선택)"}\n`;
        finalMessage += `일시 : ${dropTime}\n`;
        finalMessage += `장비명 : ${equipName}\n`;
        finalMessage += `주소 : ${dropState.address || "(주소 미선택)"}\n`;
        finalMessage += `담당자 : ${dropMgr}`;
        if (MASTER_CONTACTS[dropMgr]) finalMessage += ` (${MASTER_CONTACTS[dropMgr]})`;

        if (remarkMemo) {
            finalMessage += `\n\n[비고]\n${remarkMemo}`;
        }

        // [출력]
        document.getElementById("final_output_area").value = finalMessage;
    }

    /**
     * 9. 복사 기능 실행
     */
    function executeCopy() {
        const textArea = document.getElementById("final_output_area");
        if (!textArea.value) return;

        textArea.select();
        document.execCommand('copy');
        
        const copyBtn = document.getElementById("final_copy_btn");
        const originalContent = copyBtn.innerHTML;
        
        copyBtn.innerHTML = "<span>✅</span> 복사 완료!";
        copyBtn.classList.add("success");
        
        setTimeout(() => {
            copyBtn.innerHTML = originalContent;
            copyBtn.classList.remove("success");
        }, 2000);
    }

    /**
     * 10. 초기 로딩 완료 시 실행
     */
    document.addEventListener("DOMContentLoaded", () => {
        // 검색 워크플로우 초기화
        setupSearchWorkflow("p", pickupState);
        setupSearchWorkflow("d", dropState);
        
        // 담당자 이름 입력 시 전화번호 힌트 자동 연동
        document.getElementById("p_manager_name").addEventListener("input", () => refreshPhoneHint("p"));
        document.getElementById("d_manager_name").addEventListener("input", () => refreshPhoneHint("d"));
        
        // 드롭다운 외 영역 클릭 시 닫기
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".input-group")) {
                document.querySelectorAll(".search-dropdown").forEach(d => d.classList.remove("visible"));
            }
        });
    });

</script>

</body>
</html>
