<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배차 메시지 매니저 - 주소 완전판</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           [1. CSS 변수 및 기본 테마 정의]
           ==================================================
        */
        :root {
            --primary-navy: #1a1a2e;       /* 메인 컬러 */
            --accent-red: #e94560;         /* 포인트 컬러 */
            --sub-blue: #0f3460;           /* 보조 컬러 */
            --bg-canvas: #eef1f8;          /* 배경색 */
            --card-surface: #ffffff;       /* 카드 배경 */
            --input-base: #f7f8fc;         /* 입력창 기본 */
            --border-standard: #e2e5ef;    /* 경계선 */
            --text-bold: #1a1a2e;          /* 강조 텍스트 */
            --text-dim: #7b8196;           /* 흐린 텍스트 */
            --green-active: #2ecc71;       /* 성공/하차 색상 */
            --orange-active: #f39c12;      /* 상차 색상 */
            --shadow-light: 0 4px 20px rgba(26, 26, 46, 0.08);
            --shadow-deep: 0 12px 35px rgba(26, 26, 46, 0.15);
        }

        /* 여백 및 폰트 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-bold);
            padding: 40px 20px;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================================================
           [2. 메인 구조 레이아웃]
           ==================================================
        */
        .app-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 헤더 디자인 */
        .main-header {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
            gap: 25px;
            animation: fadeIn 0.8s ease;
        }

        .main-header .icon-box {
            width: 80px;
            height: 80px;
            background-color: var(--primary-navy);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 25px rgba(26, 26, 46, 0.25);
        }

        .header-content h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary-navy);
        }

        .header-content p {
            color: var(--text-dim);
            font-size: 16px;
            font-weight: 400;
            margin-top: 5px;
        }

        /* ==================================================
           [3. 입력 카드 섹션]
           ==================================================
        */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel-card {
            background: var(--card-surface);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border-standard);
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-deep);
        }

        /* 카드별 타이틀 라벨 */
        .status-header {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f7;
        }

        .status-dot {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
        }

        .dot-pickup { background-color: #fff3cd; color: #b45309; }
        .dot-drop { background-color: #d1fae5; color: #065f46; }

        .status-label {
            margin-left: 15px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-navy);
        }

        /* ==================================================
           [4. 폼 및 입력 엘리먼트 디자인]
           ==================================================
        */
        .form-row {
            margin-bottom: 25px;
            position: relative;
        }

        .form-row label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-left: 5px;
            letter-spacing: 0.5px;
        }

        .form-row input {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid var(--border-standard);
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background-color: var(--input-base);
            transition: all 0.3s ease;
            outline: none;
            color: var(--text-bold);
        }

        .form-row input:focus {
            border-color: var(--accent-red);
            background-color: #ffffff;
            box-shadow: 0 0 0 6px rgba(233, 69, 96, 0.07);
        }

        /* 주소 자동입력 전용 (Read-Only) 스타일 */
        .form-row input[readonly] {
            border-color: var(--green-active);
            background-color: #f0fdf4;
            color: #166534;
            font-weight: 600;
        }

        /* ==================================================
           [5. 검색 드롭다운 시스템]
           ==================================================
        */
        .dropdown-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(26, 26, 46, 0.2);
            z-index: 9999;
            margin-top: 10px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border-standard);
        }

        .dropdown-results.open {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .result-row {
            padding: 20px 25px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5fa;
            transition: background 0.2s ease;
        }

        .result-row:hover {
            background-color: #f0f4ff;
        }

        .res-title {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary-navy);
            margin-bottom: 5px;
        }

        .res-addr {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* ==================================================
           [6. 지도 렌더링 영역]
           ==================================================
        */
        .map-wrapper {
            width: 100%;
            height: 240px;
            border-radius: 20px;
            border: 2px solid var(--border-standard);
            margin-top: 25px;
            overflow: hidden;
            display: none; /* 검색 전에는 숨김 */
        }

        .map-wrapper.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        /* ==================================================
           [7. 추가 정보 및 버튼]
           ==================================================
        */
        .bottom-panel {
            background: var(--card-surface);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid var(--border-standard);
            box-shadow: var(--shadow-light);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 600px) {
            .bottom-panel { grid-template-columns: 1fr; }
        }

        .btn-generate {
            width: 100%;
            padding: 24px;
            background-color: var(--accent-red);
            color: #ffffff;
            border: none;
            border-radius: 22px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(233, 69, 96, 0.35);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-generate:hover {
            transform: translateY(-6px);
            background-color: #d63651;
            box-shadow: 0 18px 40px rgba(233, 69, 96, 0.45);
        }

        /* ==================================================
           [8. 최종 결과물 출력 섹션]
           ==================================================
        */
        .result-section {
            margin-top: 50px;
            background-color: var(--primary-navy);
            border-radius: 40px;
            padding: 50px;
            animation: fadeInUp 0.8s ease;
        }

        .result-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .result-info h2 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .btn-copy {
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }

        .btn-copy.success {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        .output-area {
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            color: #ffffff;
            font-family: 'Noto Sans KR', monospace;
            font-size: 17px;
            line-height: 2.0;
            resize: none;
            outline: none;
        }

        /* 담당자 전화번호 미리보기 힌트 */
        .phone-hint {
            font-size: 14px;
            color: var(--accent-red);
            font-weight: 800;
            margin-top: 10px;
            min-height: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ==================================================
           [9. 애니메이션 정의]
           ==================================================
        */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="app-container">
    
    <header class="main-header">
        <div class="icon-box">🚛</div>
        <div class="header-content">
            <h1>운송 배차 매니저 PRO</h1>
            <p>상세 주소와 층수까지 완벽하게 포함된 배차 메시지를 생성합니다.</p>
        </div>
    </header>

    <div class="card-grid">
        
        <section class="panel-card">
            <div class="status-header">
                <div class="status-dot dot-pickup">상</div>
                <span class="status-label">상차지 정보 설정</span>
            </div>

            <div class="form-row">
                <label>장소 키워드 검색</label>
                <input type="text" id="p_search" placeholder="장소명 입력 (예: 용마, 병원명 등)">
                <div id="p_dropdown" class="dropdown-results"></div>
            </div>

            <div class="form-row">
                <label>기본 주소 (도로명)</label>
                <input type="text" id="p_addr_base" readonly placeholder="검색 시 자동 입력됩니다.">
            </div>

            <div class="form-row">
                <label>상세 주소 (층수/호수 등)</label>
                <input type="text" id="p_addr_detail" placeholder="예: 3층 수술실 앞, 지하 2층 하역장">
            </div>

            <div id="p_map_wrap" class="map-wrapper">
                <div id="p_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="form-row" style="margin-top: 30px;">
                <label>상차 일시</label>
                <input type="text" id="p_time" placeholder="예: 05/25(일) 오전 09시">
            </div>

            <div class="form-row">
                <label>상차지 담당자</label>
                <input type="text" id="p_mgr" list="master_mgr_list" placeholder="성함 입력">
                <div id="p_hint" class="phone-hint"></div>
            </div>
        </section>

        <section class="panel-card">
            <div class="status-header">
                <div class="status-dot dot-drop">하</div>
                <span class="status-label">하차지 정보 설정</span>
            </div>

            <div class="form-row">
                <label>장소 키워드 검색</label>
                <input type="text" id="d_search" placeholder="병원명 또는 주소 검색">
                <div id="d_dropdown" class="dropdown-results"></div>
            </div>

            <div class="form-row">
                <label>기본 주소 (도로명)</label>
                <input type="text" id="d_addr_base" readonly placeholder="검색 시 자동 입력됩니다.">
            </div>

            <div class="form-row">
                <label>상세 주소 (층수/호수 등)</label>
                <input type="text" id="d_addr_detail" placeholder="예: 5층 검사실, 본관 뒤편 1층">
            </div>

            <div id="d_map_wrap" class="map-wrapper">
                <div id="d_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="form-row" style="margin-top: 30px;">
                <label>하차 일시</label>
                <input type="text" id="d_time" placeholder="예: 05/25(일) 오후 02시">
            </div>

            <div class="form-row">
                <label>하차지 담당자</label>
                <input type="text" id="d_mgr" list="master_mgr_list" placeholder="성함 입력">
                <div id="d_hint" class="phone-hint"></div>
            </div>
        </section>

    </div> <div class="bottom-panel">
        <div class="form-row" style="margin-bottom: 0;">
            <label>운송 대상 장비명</label>
            <input type="text" id="equip_name" placeholder="예: Nordlys 장비 일체">
        </div>
        <div class="form-row" style="margin-bottom: 0;">
            <label>기사님 전달 비고</label>
            <input type="text" id="main_memo" placeholder="전달할 특이사항을 입력해 주세요.">
        </div>
    </div>

    <button class="btn-generate" onclick="executeMessageBuild()">
        <span>🚀</span> 최종 배차 메시지 생성하기
    </button>

    <div class="result-section">
        <div class="result-info">
            <h2>Final Logistics Information</h2>
            <button class="btn-copy" id="copy_trigger" onclick="performCopy()">
                <span>📋</span> 전체 복사하기
            </button>
        </div>
        <textarea id="final_message_box" class="output-area" readonly></textarea>
    </div>

</div> <datalist id="master_mgr_list">
    <option value="김기훈"><option value="오상걸"><option value="박윤아"><option value="김성훈"><option value="이가람">
</datalist>


<script>
    /**
     * 1. 시스템 핵심 데이터 정의
     */
    const CONTACT_MAP = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541"
    };

    const QUICK_SEARCH_MAP = {
        "용마": {
            place: "김포 용마창고",
            addr: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            lat: 37.6086,
            lng: 126.7628,
            mgr: "김기훈"
        }
    };

    /**
     * 2. 장소/지도 상태 관리
     */
    const kakaoSearchService = new kakao.maps.services.Places();
    
    let pState = { name: "", addr: "", lat: null, lng: null, map: null, marker: null };
    let dState = { name: "", addr: "", lat: null, lng: null, map: null, marker: null };

    /**
     * 3. 검색 기능 초기화
     */
    function initSearchEngine(prefix, stateObj) {
        const input = document.getElementById(prefix + "_search");
        const dropdown = document.getElementById(prefix + "_dropdown");

        input.addEventListener("input", function() {
            const query = this.value.trim();
            
            if (!query) {
                dropdown.classList.remove("open");
                return;
            }

            // [A] 단축어 검사 (용마 등)
            if (QUICK_SEARCH_MAP[query]) {
                const data = QUICK_SEARCH_MAP[query];
                confirmPlaceSelection(prefix, data.place, data.addr, data.lat, data.lng, stateObj);
                
                if (data.mgr) {
                    document.getElementById(prefix + "_mgr").value = data.mgr;
                    updateHint(prefix);
                }
                dropdown.classList.remove("open");
                return;
            }

            // [B] 카카오 API 검색
            kakaoSearchService.keywordSearch(query, (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    renderDropdownItems(prefix, result, stateObj);
                } else {
                    dropdown.classList.remove("open");
                }
            });
        });
    }

    /**
     * 4. 드롭다운 목록 렌더링
     */
    function renderDropdownItems(prefix, items, stateObj) {
        const dropdown = document.getElementById(prefix + "_dropdown");
        dropdown.innerHTML = "";

        items.slice(0, 10).forEach(item => {
            // 주소 우선순위: 도로명 주소(road_address_name) -> 지번 주소(address_name)
            const resolvedAddr = item.road_address_name || item.address_name;
            
            const div = document.createElement("div");
            div.className = "result-row";
            div.innerHTML = `
                <div class="res-title">${item.place_name}</div>
                <div class="res-addr">${resolvedAddr}</div>
            `;
            
            div.onclick = () => {
                confirmPlaceSelection(prefix, item.place_name, resolvedAddr, item.y, item.x, stateObj);
                dropdown.classList.remove("open");
            };
            
            dropdown.appendChild(div);
        });
        
        dropdown.classList.add("open");
    }

    /**
     * 5. 장소 확정 및 지도 표출
     */
    function confirmPlaceSelection(prefix, name, addr, lat, lng, stateObj) {
        document.getElementById(prefix + "_search").value = name;
        document.getElementById(prefix + "_addr_base").value = addr;
        
        stateObj.name = name;
        stateObj.addr = addr;
        stateObj.lat = lat;
        stateObj.lng = lng;

        const wrapper = document.getElementById(prefix + "_map_wrap");
        wrapper.classList.add("show");

        const targetPos = new kakao.maps.LatLng(lat, lng);
        
        if (!stateObj.map) {
            const mapDom = document.getElementById(prefix + "_map_dom");
            stateObj.map = new kakao.maps.Map(mapDom, { center: targetPos, level: 3 });
            stateObj.marker = new kakao.maps.Marker({ position: targetPos, map: stateObj.map });
        } else {
            stateObj.map.setCenter(targetPos);
            stateObj.marker.setPosition(targetPos);
            setTimeout(() => stateObj.map.relayout(), 200);
        }
    }

    /**
     * 6. 지역명 추출기 (주소에서 '강남', '서초' 등만 추출)
     */
    function getShortRegion(fullAddress) {
        if (!fullAddress) return "";
        const parts = fullAddress.split(" ");
        if (parts.length > 1) {
            // 두 번째 토큰(구/시 명칭)에서 '구', '시', '군'을 제거
            return parts[1].replace(/구$|시$|군$/, "");
        }
        return "";
    }

    /**
     * 7. 담당자 연락처 힌트 동기화
     */
    function updateHint(prefix) {
        const val = document.getElementById(prefix + "_mgr").value.trim();
        const hintEl = document.getElementById(prefix + "_hint");
        
        if (CONTACT_MAP[val]) {
            hintEl.innerHTML = `<span>☎</span> ${CONTACT_MAP[val]}`;
        } else {
            hintEl.innerHTML = "";
        }
    }

    /**
     * 8. [CORE] 메시지 생성 로직
     */
    function executeMessageBuild() {
        // 기본 입력 데이터 가져오기
        const pDetail = document.getElementById("p_addr_detail").value.trim();
        const dDetail = document.getElementById("d_addr_detail").value.trim();
        
        const pTime = document.getElementById("p_time").value.trim() || "(시간 협의)";
        const dTime = document.getElementById("d_time").value.trim() || "(시간 협의)";
        
        const pMgr = document.getElementById("p_mgr").value.trim() || "(미입력)";
        const dMgr = document.getElementById("d_mgr").value.trim() || "(미입력)";
        
        const equipment = document.getElementById("equip_name").value.trim() || "(미입력)";
        const memo = document.getElementById("main_memo").value.trim();

        // [지역 기반 장소명 생성]
        const pRegion = getShortRegion(pState.addr);
        const pDisplayTitle = pRegion ? `${pRegion} ${pState.name}` : pState.name;

        const dRegion = getShortRegion(dState.addr);
        const dDisplayTitle = dRegion ? `${dRegion} ${dState.name}` : dState.name;

        // [주소 풀셋 조립] 도로명 + 상세주소
        const pFullAddress = pDetail ? `${pState.addr} (${pDetail})` : pState.addr;
        const dFullAddress = dDetail ? `${dState.addr} (${dDetail})` : dState.addr;

        // [메시지 템플릿 조립]
        let msg = `[상차]\n`;
        msg += `상차 : ${pDisplayTitle || "(미선택)"}\n`;
        msg += `일시 : ${pTime}\n`;
        msg += `장비명 : ${equipment}\n`;
        msg += `주소 : ${pFullAddress || "(미선택)"}\n`;
        msg += `담당자 : ${pMgr}`;
        if (CONTACT_MAP[pMgr]) msg += ` (${CONTACT_MAP[pMgr]})`;

        msg += `\n\n[하차]\n`;
        msg += `하차 : ${dDisplayTitle || "(미선택)"}\n`;
        msg += `일시 : ${dTime}\n`;
        msg += `장비명 : ${equipment}\n`;
        msg += `주소 : ${dFullAddress || "(미선택)"}\n`;
        msg += `담당자 : ${dMgr}`;
        if (CONTACT_MAP[dMgr]) msg += ` (${CONTACT_MAP[dMgr]})`;

        if (memo) {
            msg += `\n\n[비고]\n${memo}`;
        }

        // 텍스트 영역에 출력
        document.getElementById("final_message_box").value = msg;
    }

    /**
     * 9. 클립보드 복사 로직
     */
    function performCopy() {
        const area = document.getElementById("final_message_box");
        if (!area.value) return;

        area.select();
        document.execCommand('copy');
        
        const btn = document.getElementById("copy_trigger");
        const oldText = btn.innerHTML;
        
        btn.innerHTML = "<span>✅</span> 복사 완료!";
        btn.classList.add("success");
        
        setTimeout(() => {
            btn.innerHTML = oldText;
            btn.classList.remove("success");
        }, 2000);
    }

    /**
     * 10. 페이지 로드 초기화
     */
    document.addEventListener("DOMContentLoaded", () => {
        // 상/하차지 독립 검색 엔진 초기화
        initSearchEngine("p", pState);
        initSearchEngine("d", dState);
        
        // 담당자 연락처 실시간 매칭
        document.getElementById("p_mgr").addEventListener("input", () => updateHint("p"));
        document.getElementById("d_mgr").addEventListener("input", () => updateHint("d"));
        
        // 드롭다운 닫기 이벤트 (외부 클릭 시)
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".form-row")) {
                document.querySelectorAll(".dropdown-results").forEach(d => d.classList.remove("open"));
            }
        });
    });

</script>

</body>
</html>
