<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dispatch Automation Pro</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           [1. CSS RESET & GLOBAL ROOT VARIABLES]
           ========================================================================== */
        :root {
            --primary-navy: #0f172a;
            --secondary-navy: #1e293b;
            --accent-crimson: #e11d48;
            --accent-crimson-soft: #fff1f2;
            --success-teal: #0d9488;
            --success-teal-soft: #f0fdfa;
            --neutral-bg: #f8fafc;
            --neutral-card: #ffffff;
            --neutral-border: #e2e8f0;
            --text-strong: #0f172a;
            --text-regular: #475569;
            --text-weak: #94a3b8;
            --shadow-standard: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-premium: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--neutral-bg);
            color: var(--text-regular);
            padding: 80px 20px;
            line-height: 1.6;
            word-break: keep-all;
        }

        /* ==========================================================================
           [2. UI COMPONENT: CONTAINER & HEADER]
           ========================================================================== */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .main-header {
            margin-bottom: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 2px solid var(--neutral-border);
            padding-bottom: 30px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary-navy), var(--secondary-navy));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: var(--shadow-premium);
        }

        .brand-meta h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-strong);
            letter-spacing: -1.5px;
        }

        .brand-meta p {
            font-size: 15px;
            color: var(--text-weak);
            margin-top: 4px;
        }

        /* ==========================================================================
           [3. UI COMPONENT: INFORMATION CARDS]
           ========================================================================== */
        .io-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .io-grid { grid-template-columns: 1fr; }
        }

        .io-card {
            background: var(--neutral-card);
            border-radius: 32px;
            padding: 50px;
            border: 1px solid var(--neutral-border);
            box-shadow: var(--shadow-standard);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: visible;
        }

        .io-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-premium);
        }

        .card-category {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 12px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-pickup { background: var(--accent-crimson-soft); color: var(--accent-crimson); }
        .category-drop { background: var(--success-teal-soft); color: var(--success-teal); }

        /* ==========================================================================
           [4. FORM ELEMENTS & INTERACTION]
           ========================================================================== */
        .form-unit {
            margin-bottom: 28px;
            position: relative;
        }

        .form-unit label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-strong);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .form-unit input {
            width: 100%;
            padding: 18px 24px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            font-size: 16px;
            background: #f8fafc;
            color: var(--text-strong);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-unit input:focus {
            border-color: var(--accent-crimson);
            background: #ffffff;
            box-shadow: 0 0 0 5px rgba(225, 29, 72, 0.1);
        }

        /* Auto-filled input state */
        .form-unit input.highlighted {
            background-color: var(--success-teal-soft);
            border-color: var(--success-teal);
            font-weight: 600;
        }

        /* Search Recommendation List */
        .search-engine-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: var(--shadow-premium);
            border: 1px solid var(--neutral-border);
            z-index: 1000;
            margin-top: 12px;
            max-height: 380px;
            overflow-y: auto;
            display: none;
        }

        .search-engine-results.is-visible {
            display: block;
            animation: dropdown-fade-in 0.3s ease;
        }

        @keyframes dropdown-fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            padding: 20px 25px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .result-row:hover {
            background-color: var(--accent-crimson-soft);
        }

        .row-main-title {
            font-weight: 800;
            font-size: 17px;
            color: var(--primary-navy);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row-sub-addr {
            font-size: 13px;
            color: var(--text-regular);
            margin-top: 6px;
            display: block;
        }

        /* ==========================================================================
           [5. MAP INTERFACE & VISUALS]
           ========================================================================== */
        .map-viewport {
            width: 100%;
            height: 240px;
            background: #e2e8f0;
            border-radius: 20px;
            margin-top: 25px;
            border: 2px solid #f1f5f9;
            display: none;
            overflow: hidden;
            position: relative;
        }

        .map-viewport.is-active { display: block; }

        /* ==========================================================================
           [6. SHARED DATA & CONTROLS]
           ========================================================================== */
        .common-info-panel {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 50px;
            margin-bottom: 40px;
            border: 1px solid var(--neutral-border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .generator-trigger {
            width: 100%;
            padding: 26px;
            background: var(--accent-crimson);
            color: #ffffff;
            border: none;
            border-radius: 24px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 60px;
        }

        .generator-trigger:hover {
            background: #be123c;
            transform: scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(225, 29, 72, 0.6);
        }

        /* ==========================================================================
           [7. OUTPUT REPORT DESIGN]
           ========================================================================== */
        .report-section {
            background: var(--primary-navy);
            border-radius: 48px;
            padding: 60px;
            box-shadow: var(--shadow-premium);
        }

        .report-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .report-meta h2 {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .btn-copy-clipboard {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-copy-clipboard:hover {
            background: #ffffff;
            color: var(--primary-navy);
        }

        .dispatch-content-area {
            width: 100%;
            height: 480px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px;
            color: #f1f5f9;
            font-size: 18px;
            line-height: 2.2;
            resize: none;
            outline: none;
            overflow-y: auto;
        }

        .helper-text {
            font-size: 13px;
            color: var(--accent-crimson);
            font-weight: 700;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

    </style>
</head>
<body>

<div class="app-container">
    
    <header class="main-header">
        <div class="header-brand">
            <div class="brand-icon">📦</div>
            <div class="brand-meta">
                <h1>Dispatcher Pro v7.5</h1>
                <p>Advanced Logistics Management & Address Integration System</p>
            </div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 12px; font-weight: 800; color: var(--text-weak); margin-bottom: 5px;">ENGINE STATUS</div>
            <div style="color: var(--success-teal); font-weight: 900; font-size: 14px;">READY & OPERATIONAL</div>
        </div>
    </header>

    <main>
        <div class="io-grid">
            
            <section class="io-card">
                <span class="card-category category-pickup">Pickup Point</span>
                
                <div class="form-unit" style="margin-top: 30px;">
                    <label>장소 및 건물 검색 (층수 포함)</label>
                    <input type="text" id="p_search_field" placeholder="예: 서울대병원 3층, 용마 등">
                    <div id="p_search_results" class="search-engine-results"></div>
                </div>

                <div class="form-unit">
                    <label>전체 주소 (층수 자동 결합)</label>
                    <input type="text" id="p_final_address" class="highlighted" readonly placeholder="자동으로 주소와 층수가 결합됩니다.">
                </div>

                <div id="p_map_container" class="map-viewport">
                    <div id="p_map_instance" style="width:100%; height:100%;"></div>
                </div>

                <div class="form-unit" style="margin-top: 35px;">
                    <label>상차 예정 시간</label>
                    <input type="text" id="p_dispatch_time" placeholder="예: 05/20(월) 오전 09시">
                </div>

                <div class="form-unit">
                    <label>상차 담당자</label>
                    <input type="text" id="p_manager_name" list="master_manager_list" placeholder="성함 입력">
                    <div id="p_contact_hint" class="helper-text"></div>
                </div>
            </section>

            <section class="io-card">
                <span class="card-category category-drop">Drop-off Point</span>

                <div class="form-unit" style="margin-top: 30px;">
                    <label>하차 장소 및 층수 검색</label>
                    <input type="text" id="d_search_field" placeholder="예: OO병원 암센터 5층">
                    <div id="d_search_results" class="search-engine-results"></div>
                </div>

                <div class="form-unit">
                    <label>전체 주소 (층수 자동 결합)</label>
                    <input type="text" id="d_final_address" class="highlighted" readonly placeholder="자동으로 주소와 층수가 결합됩니다.">
                </div>

                <div id="d_map_container" class="map-viewport">
                    <div id="d_map_instance" style="width:100%; height:100%;"></div>
                </div>

                <div class="form-unit" style="margin-top: 35px;">
                    <label>하차 예정 시간</label>
                    <input type="text" id="d_dispatch_time" placeholder="예: 05/20(월) 오후 02시">
                </div>

                <div class="form-unit">
                    <label>하차 담당자</label>
                    <input type="text" id="d_manager_name" list="master_manager_list" placeholder="성함 입력">
                    <div id="d_contact_hint" class="helper-text"></div>
                </div>
            </section>

        </div> <div class="common-info-panel">
            <div class="form-unit" style="margin-bottom: 0;">
                <label>운송 물품 및 장비 명칭</label>
                <input type="text" id="equipment_tag" placeholder="예: Nordlys 장비 1대">
            </div>
            <div class="form-unit" style="margin-bottom: 0;">
                <label>특이사항 (기사님 전달용)</label>
                <input type="text" id="memo_tag" placeholder="기타 주의사항 입력">
            </div>
        </div>

        <button class="generator-trigger" onclick="runFinalGeneration()">
            GENERATE DISPATCH MESSAGE ⚡
        </button>

        <section class="report-section">
            <div class="report-meta">
                <h2>Generated Dispatch Result</h2>
                <button class="btn-copy-clipboard" id="copy_btn_final" onclick="copyToClipboard()">COPY TO CLIPBOARD</button>
            </div>
            <textarea id="output_textarea" class="dispatch-content-area" readonly></textarea>
        </section>

    </main>

    <datalist id="master_manager_list">
        <option value="김기훈"><option value="오상걸"><option value="박윤아"><option value="김성훈"><option value="이가람">
    </datalist>

</div>

<script>
    /**
     * @constant GLOBAL_CONTACT_REGISTRY
     * 배차 담당자별 연락처 데이터베이스
     */
    const GLOBAL_CONTACT_REGISTRY = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541"
    };

    /**
     * @constant LOCAL_PRESETS
     * 자주 사용되는 지점의 고정 프리셋 데이터
     */
    const LOCAL_PRESETS = {
        "용마": {
            name: "김포 용마창고",
            addr: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            lat: 37.6086,
            lng: 126.7628,
            mgr: "김기훈"
        }
    };

    /**
     * @global State Management
     * 검색 및 지도 상태 관리를 위한 전역 변수
     */
    const kakaoMapSearchService = new kakao.maps.services.Places();
    
    let pState = { title: "", addr: "", lat: 0, lng: 0, map: null, marker: null };
    let dState = { title: "", addr: "", lat: 0, lng: 0, map: null, marker: null };

    /**
     * @function initializeSearchEngine
     * 검색 필드와 실시간 API 검색을 동기화하는 핵심 엔진
     */
    function initializeSearchEngine(prefix, storage) {
        const inputField = document.getElementById(prefix + "_search_field");
        const resultsBox = document.getElementById(prefix + "_search_results");

        inputField.addEventListener("input", function() {
            const val = this.value.trim();
            if (!val) {
                resultsBox.classList.remove("is-visible");
                return;
            }

            // [Step 1] 프리셋 키워드 대조 (용마 등)
            if (LOCAL_PRESETS[val]) {
                const pre = LOCAL_PRESETS[val];
                applySelectionData(prefix, pre.name, pre.addr, pre.lat, pre.lng, storage);
                if (pre.mgr) {
                    document.getElementById(prefix + "_manager_name").value = pre.mgr;
                    updateContactHint(prefix);
                }
                resultsBox.classList.remove("is-visible");
                return;
            }

            // [Step 2] 카카오 로컬 키워드 검색 API 호출
            kakaoMapSearchService.keywordSearch(val, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    renderSearchResults(prefix, data, storage);
                } else {
                    resultsBox.classList.remove("is-visible");
                }
            });
        });
    }

    /**
     * @function renderSearchResults
     * 검색된 결과를 화면에 표시하며 '층수/건물명' 결합 로직을 처리
     */
    function renderSearchResults(prefix, items, storage) {
        const resultsBox = document.getElementById(prefix + "_search_results");
        resultsBox.innerHTML = "";

        // 최대 상위 10개 데이터만 슬라이싱하여 렌더링
        items.slice(0, 10).forEach(item => {
            // [★ 핵심 로직: 층수/건물명 자동 결합]
            // 카카오에서 제공하는 'road_address_name'은 기본 주소만 있습니다.
            // 'place_name'에는 'OO병원 3층'과 같이 구체적인 위치가 들어있습니다.
            // 이 두 개를 클릭 시점에 하나로 합쳐서 '상세 주소'로 만듭니다.
            const baseAddr = item.road_address_name || item.address_name;
            const detailName = item.place_name;
            
            // 주소에 장소명이 포함되어 있지 않다면 괄호로 병기하여 기사님께 정보 제공
            const fullAutoAddress = baseAddr.includes(detailName) ? baseAddr : `${baseAddr} (${detailName})`;

            const row = document.createElement("div");
            row.className = "result-row";
            row.innerHTML = `
                <div class="row-main-title">🏢 ${detailName}</div>
                <div class="row-sub-addr">${fullAutoAddress}</div>
            `;
            
            // 클릭 이벤트: 주소와 층수를 한 번에 확정
            row.onclick = () => {
                applySelectionData(prefix, detailName, fullAutoAddress, item.y, item.x, storage);
                resultsBox.classList.remove("is-visible");
            };
            resultsBox.appendChild(row);
        });
        
        resultsBox.classList.add("is-visible");
    }

    /**
     * @function applySelectionData
     * 선택된 장소의 최종 데이터를 폼에 적용하고 지도를 렌더링
     */
    function applySelectionData(prefix, name, addr, lat, lng, storage) {
        // UI 입력값 동기화
        document.getElementById(prefix + "_search_field").value = name;
        document.getElementById(prefix + "_final_address").value = addr;
        
        // 상태값 업데이트
        storage.title = name;
        storage.addr = addr;
        storage.lat = lat;
        storage.lng = lng;

        // 지도 영역 활성화
        const mapArea = document.getElementById(prefix + "_map_container");
        mapArea.classList.add("is-active");

        const targetPosition = new kakao.maps.LatLng(lat, lng);
        
        // 지도 인스턴스 존재 여부에 따른 초기화/갱신
        if (!storage.map) {
            const mapDom = document.getElementById(prefix + "_map_instance");
            storage.map = new kakao.maps.Map(mapDom, { center: targetPosition, level: 3 });
            storage.marker = new kakao.maps.Marker({ position: targetPosition, map: storage.map });
        } else {
            storage.map.setCenter(targetPosition);
            storage.marker.setPosition(targetPosition);
            // 맵 리레이아웃 타이밍 보정
            setTimeout(() => storage.map.relayout(), 150);
        }
    }

    /**
     * @function parseRegionTag
     * 주소 문자열로부터 '구/시' 명칭을 파싱하여 배차 라벨로 활용
     */
    function parseRegionTag(fullAddress) {
        if (!fullAddress) return "";
        const segments = fullAddress.split(" ");
        // 주소의 두 번째 마디(예: 서초구)에서 구/시/군 접미사를 제거
        if (segments.length > 1) {
            return segments[1].replace(/구$|시$|군$/, "");
        }
        return "";
    }

    /**
     * @function updateContactHint
     * 담당자 선택 시 연락처 미리보기를 하단에 노출
     */
    function updateContactHint(prefix) {
        const currentName = document.getElementById(prefix + "_manager_name").value.trim();
        const hintElement = document.getElementById(prefix + "_contact_hint");
        
        if (GLOBAL_CONTACT_REGISTRY[currentName]) {
            hintElement.innerHTML = `📞 매칭 완료: ${GLOBAL_CONTACT_REGISTRY[currentName]}`;
        } else {
            hintElement.innerHTML = "";
        }
    }

    /**
     * @function runFinalGeneration
     * 모든 상태 데이터를 취합하여 최종 배차 메시지 생성
     */
    function runFinalGeneration() {
        // 폼 데이터 수집
        const pTime = document.getElementById("p_dispatch_time").value.trim() || "(시간협의)";
        const dTime = document.getElementById("d_dispatch_time").value.trim() || "(시간협의)";
        const pMgr = document.getElementById("p_manager_name").value.trim() || "(미기재)";
        const dMgr = document.getElementById("d_manager_name").value.trim() || "(미기재)";
        const eqInfo = document.getElementById("equipment_tag").value.trim() || "(장비명 미기재)";
        const orderMemo = document.getElementById("memo_tag").value.trim();

        // 스마트 라벨링: [지역 + 장소명] 조합
        const pLoc = parseRegionTag(pState.addr);
        const pHeaderName = pLoc ? `${pLoc} ${pState.title}` : pState.title;

        const dLoc = parseRegionTag(dState.addr);
        const dHeaderName = dLoc ? `${dLoc} ${dState.title}` : dState.title;

        // 최종 문자열 빌드
        let finalReport = `[상차 접수내역]\n`;
        finalReport += `상차지 : ${pHeaderName || "(장소 미선택)"}\n`;
        finalReport += `일시 : ${pTime}\n`;
        finalReport += `장비명 : ${eqInfo}\n`;
        finalReport += `주소 : ${pState.addr || "(주소 미입력)"}\n`; // 결합된 상세 주소(층수 포함) 출력
        finalReport += `담당자 : ${pMgr}`;
        if (GLOBAL_CONTACT_REGISTRY[pMgr]) finalReport += ` (${GLOBAL_CONTACT_REGISTRY[pMgr]})`;

        finalReport += `\n\n[하차 접수내역]\n`;
        finalReport += `하차지 : ${dHeaderName || "(장소 미선택)"}\n`;
        finalReport += `일시 : ${dTime}\n`;
        finalReport += `장비명 : ${eqInfo}\n`;
        finalReport += `주소 : ${dState.addr || "(주소 미입력)"}\n`; // 결합된 상세 주소(층수 포함) 출력
        finalReport += `담당자 : ${dMgr}`;
        if (GLOBAL_CONTACT_REGISTRY[dMgr]) finalReport += ` (${GLOBAL_CONTACT_REGISTRY[dMgr]})`;

        // 비고 섹션 (있는 경우만 표시)
        if (orderMemo) {
            finalReport += `\n\n[기사님 전달사항]\n${orderMemo}`;
        }

        // 결과창에 바인딩
        const outputArea = document.getElementById("output_textarea");
        outputArea.value = finalReport;
        
        // 화면 하단 결과창으로 스무스하게 스크롤
        window.scrollTo({
            top: outputArea.getBoundingClientRect().top + window.scrollY - 100,
            behavior: 'smooth'
        });
    }

    /**
     * @function copyToClipboard
     * 생성된 배차 메시지를 클립보드로 복사
     */
    function copyToClipboard() {
        const textArea = document.getElementById("output_textarea");
        if (!textArea.value) return;

        textArea.select();
        document.execCommand('copy');
        
        const copyBtn = document.getElementById("copy_btn_final");
        const originalText = copyBtn.innerText;
        
        copyBtn.innerText = "COPIED SUCCESSFULLY! ✅";
        copyBtn.style.background = var(--success-teal);
        
        setTimeout(() => {
            copyBtn.innerText = originalText;
            copyBtn.style.background = ""; // 원복
        }, 2000);
    }
