<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운송 배차 메시지 생성기 | Enterprise</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services&autoload=false"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           [1. CSS VARIABLES & THEME CONFIGURATION]
           ==================================================
        */
        :root {
            /* Palette Definition */
            --navy-deep: #0f172a;
            --navy-light: #1e293b;
            --accent-red: #f43f5e;
            --accent-red-hover: #e11d48;
            --success-green: #10b981;
            --warning-amber: #f59e0b;
            --bg-main: #f8fafc;
            --border-soft: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;

            /* Shadows & Effects */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --transition-std: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================================================
           [2. GLOBAL RESET & BASE STYLES]
           ==================================================
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 60px 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar Customization */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==================================================
           [3. LAYOUT COMPONENTS]
           ==================================================
        */
        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        /* ── 프리셋 드롭다운 ── */
        .preset-bar {
            margin-bottom: 24px;
            position: relative;
            display: inline-block;
        }

        .preset-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--white);
            border: 1.5px solid var(--border-soft);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: var(--navy-deep);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            font-family: inherit;
        }

        .preset-toggle-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .preset-toggle-btn .arrow {
            font-size: 10px;
            transition: transform 0.2s;
        }

        .preset-toggle-btn.open .arrow { transform: rotate(180deg); }

        .preset-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: var(--white);
            border: 1.5px solid var(--border-soft);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            z-index: 200;
            min-width: 260px;
            padding: 10px;
            display: none;
        }

        .preset-dropdown.open { display: block; animation: slideDown 0.18s ease; }

        .preset-chip {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid var(--border-soft);
            background: #f8fafc;
        }

        .preset-chip:last-child { margin-bottom: 0; }

        .preset-chip-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--navy-deep);
        }

        .preset-chip-keyword {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 3px;
            margin-bottom: 10px;
        }

        .preset-chip-btn-row {
            display: flex;
            gap: 6px;
        }

        .preset-btn {
            flex: 1;
            padding: 7px 0;
            font-size: 11px;
            font-weight: 700;
            border: 1.5px solid var(--border-soft);
            border-radius: 8px;
            background: white;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .preset-btn.pickup:hover { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .preset-btn.drop:hover   { background: #dcfce7; color: #166534; border-color: #86efac; }


        /* ── 날짜 빠른 선택 버튼 ── */
        .date-quick-btns {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .date-quick-btn {
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            border: 1.5px solid var(--border-soft);
            border-radius: 8px;
            background: white;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .date-quick-btn:hover { background: var(--navy-deep); color: white; border-color: var(--navy-deep); }

        /* ── 날짜+시간 입력 ── */
        .datetime-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .datetime-row input[type="date"] {
            flex: 1.4;
            padding: 16px 12px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 14px;
            background: #f8fafc;
            color: var(--text-main);
            transition: var(--transition-std);
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }

        .datetime-row input[type="date"]:focus {
            border-color: var(--accent-red);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }

        .datetime-row input[type="text"].time-input {
            flex: 1;
            padding: 16px 12px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 14px;
            background: #f8fafc;
            color: var(--text-main);
            transition: var(--transition-std);
            outline: none;
            font-family: inherit;
        }

        .datetime-row input[type="text"].time-input:focus {
            border-color: var(--accent-red);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }

        /* ── 모바일 반응형 ── */
        @media (max-width: 640px) {
            body { padding: 20px 12px; }
            .header-section { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 28px; }
            .brand-text h1 { font-size: 20px; }
            .data-card { padding: 24px 18px; }
            .result-container { padding: 28px 18px; }
            .output-box { font-size: 13px; height: 300px; }
            .btn-main { font-size: 16px; padding: 18px; }
            .settings-card { padding: 20px 18px; }
            .preset-dropdown { min-width: 220px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 30px;
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--navy-deep), var(--navy-light));
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-md);
        }

        .brand-text h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--navy-deep);
        }

        .brand-text p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ==================================================
           [4. FORM GRID & CARDS]
           ==================================================
        */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        @media (max-width: 960px) {
            .grid-container { grid-template-columns: 1fr; }
        }

        .data-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-std);
            position: relative;
            overflow: hidden;
        }

        .data-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        /* Card Header Badges */
        .card-type-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .type-pickup { background: #fee2e2; color: #991b1b; }
        .type-drop { background: #dcfce7; color: #166534; }

        /* ==================================================
           [5. INPUT FIELDS & SEARCH BOX]
           ==================================================
        */
        .field-group {
            margin-bottom: 24px;
            position: relative;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .field-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 15px;
            background: #f8fafc;
            color: var(--text-main);
            transition: var(--transition-std);
            outline: none;
        }

        .field-group input:focus {
            border-color: var(--accent-red);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }

        /* Readonly / Auto-filled Style */
        .field-group input[readonly] {
            background-color: #f1f5f9;
            color: var(--text-muted);
            border-color: var(--border-soft);
            cursor: not-allowed;
            font-weight: 500;
        }

        /* Search Dropdown Results */
        .search-portal {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
            z-index: 1000;
            margin-top: 8px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
        }

        .search-portal.active { display: block; animation: slideDown 0.2s ease; }

        .search-item {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .search-item:hover { background: #fdf2f2; }

        .item-place { font-weight: 700; font-size: 15px; color: var(--navy-deep); }
        .item-addr { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* ==================================================
           [6. INTERACTIVE MAP SECTION]
           ==================================================
        */
        .map-canvas {
            width: 100%;
            height: 200px;
            background: #f1f5f9;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-soft);
            display: none;
            overflow: hidden;
        }

        .map-canvas.visible { display: block; }

        /* ==================================================
           [7. GLOBAL SETTINGS AREA]
           ==================================================
        */
        .settings-card {
            background: var(--white);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border-soft);
            margin-bottom: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 600px) { .settings-card { grid-template-columns: 1fr; } }

        /* ==================================================
           [8. ACTION BUTTONS & OUTPUT]
           ==================================================
        */
        .action-zone {
            margin-top: 40px;
        }

        .btn-main {
            width: 100%;
            padding: 22px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);
            transition: var(--transition-std);
        }

        .btn-main:hover {
            background: var(--accent-red-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(244, 63, 94, 0.5);
        }

        .result-container {
            margin-top: 50px;
            background: var(--navy-deep);
            border-radius: 32px;
            padding: 48px;
            box-shadow: var(--shadow-lg);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .result-header h2 {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-copy {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }

        .btn-copy:hover { background: rgba(255,255,255,0.2); }

        .output-box {
            width: 100%;
            height: 420px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            color: #e2e8f0;
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            line-height: 1.8;
            resize: none;
            outline: none;
        }

        /* ==================================================
           [9. UTILITY CLASSES]
           ==================================================
        */
        .mgr-hint {
            font-size: 12px;
            color: var(--accent-red);
            font-weight: 700;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="wrapper">
    <div class="preset-bar">
        <button class="preset-toggle-btn" id="presetToggleBtn" onclick="togglePresetDropdown()">
            📌 프리셋 장소 <span class="arrow">▼</span>
        </button>
        <div class="preset-dropdown" id="presetDropdown">
            <div id="preset-list"></div>
        </div>
    </div>
    <header class="header-section">
        <div class="brand-group">
            <div class="logo-mark">🚚</div>
            <div class="brand-text">
                <h1>Logistics Dispatcher Pro</h1>
                <p>Enterprise Management System v5.0.1 · 최종수정 2026년 04월 28일 수정</p>
            </div>
        </div>
        <div style="text-align: right;">
            <span style="font-size: 12px; color: var(--text-muted);">Status: Ready</span>
            <div style="font-weight: 700; color: var(--success-green);">● System Online</div>
        </div>
    </header>

    <div class="grid-container">
        
        <section class="data-card">
            <span class="card-type-badge type-pickup">상차지 정보 (Pickup)</span>
            
            <div class="field-group">
                <label>장소 명칭 검색</label>
                <input type="text" id="p_search" placeholder="병원명/창고명 검색 (예: 용마)">
                <div id="p_portal" class="search-portal"></div>
            </div>

            <div class="field-group">
                <label>자동 매칭 전체 주소</label>
                <input type="text" id="p_addr" readonly placeholder="장소 선택 시 자동 입력">
            </div>
            <div class="field-group">
                <label>상세 주소 <span style="color:#94a3b8;font-weight:400;">(선택)</span></label>
                <input type="text" id="p_addr_detail" placeholder="동/호수, 층, 건물명 등">
            </div>

            <div id="p_map_wrap" class="map-canvas">
                <div id="p_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="field-group" style="margin-top: 24px;">
                <label>상차 일시</label>
                <div class="date-quick-btns">
                    <button class="date-quick-btn" onclick="setQuickDate('p','today')">오늘</button>
                    <button class="date-quick-btn" onclick="setQuickDate('p','tomorrow')">내일</button>
                    <button class="date-quick-btn" onclick="setQuickDate('p','clear')">초기화</button>
                </div>
                <div class="datetime-row">
                    <input type="date" id="p_date">
                    <input type="text" class="time-input" id="p_time_txt" placeholder="시간 (예: 09:00)">
                </div>
            </div>

            <div class="field-group">
                <label>현장 담당자</label>
                <div style="position:relative;">
                    <input type="text" id="p_mgr" list="master_mgrs" placeholder="이름 입력 (목록에서 선택 또는 직접 입력)" style="padding-right:40px;">
                    <button onclick="document.getElementById('p_mgr').value='';document.getElementById('p_hint').innerHTML='';document.getElementById('p_phone').value='';document.getElementById('p_mgr').focus();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:#94a3b8;cursor:pointer;line-height:1;">×</button>
                </div>
                <div id="p_hint" class="mgr-hint"></div>
            </div>
            <div class="field-group">
                <label>현장 담당자 연락처</label>
                <div style="position:relative;">
                    <input type="text" id="p_phone" placeholder="숫자만 입력하면 자동으로 - 추가됩니다" style="padding-right:40px;">
                    <button onclick="document.getElementById('p_phone').value='';document.getElementById('p_phone').focus();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:#94a3b8;cursor:pointer;line-height:1;">×</button>
                </div>
            </div>
        </section>

        <section class="data-card">
            <span class="card-type-badge type-drop">하차지 정보 (Drop-off)</span>

            <div class="field-group">
                <label>하차 장소 검색</label>
                <input type="text" id="d_search" placeholder="도착 병원명/기관명 검색">
                <div id="d_portal" class="search-portal"></div>
            </div>

            <div class="field-group">
                <label>자동 매칭 전체 주소</label>
                <input type="text" id="d_addr" readonly placeholder="장소 선택 시 자동 입력">
            </div>
            <div class="field-group">
                <label>상세 주소 <span style="color:#94a3b8;font-weight:400;">(선택)</span></label>
                <input type="text" id="d_addr_detail" placeholder="동/호수, 층, 건물명 등">
            </div>

            <div id="d_map_wrap" class="map-canvas">
                <div id="d_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="field-group" style="margin-top: 24px;">
                <label>하차 일시</label>
                <div class="date-quick-btns">
                    <button class="date-quick-btn" onclick="setQuickDate('d','today')">오늘</button>
                    <button class="date-quick-btn" onclick="setQuickDate('d','tomorrow')">내일</button>
                    <button class="date-quick-btn" onclick="setQuickDate('d','clear')">초기화</button>
                </div>
                <div class="datetime-row">
                    <input type="date" id="d_date">
                    <input type="text" class="time-input" id="d_time_txt" placeholder="시간 (예: 14:00)">
                </div>
            </div>

            <div class="field-group">
                <label>수령 담당자</label>
                <div style="position:relative;">
                    <input type="text" id="d_mgr" list="master_mgrs" placeholder="이름 입력 (목록에서 선택 또는 직접 입력)" style="padding-right:40px;">
                    <button onclick="document.getElementById('d_mgr').value='';document.getElementById('d_hint').innerHTML='';document.getElementById('d_phone').value='';document.getElementById('d_mgr').focus();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:#94a3b8;cursor:pointer;line-height:1;">×</button>
                </div>
                <div id="d_hint" class="mgr-hint"></div>
            </div>
            <div class="field-group">
                <label>수령 담당자 연락처</label>
                <div style="position:relative;">
                    <input type="text" id="d_phone" placeholder="숫자만 입력하면 자동으로 - 추가됩니다" style="padding-right:40px;">
                    <button onclick="document.getElementById('d_phone').value='';document.getElementById('d_phone').focus();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:#94a3b8;cursor:pointer;line-height:1;">×</button>
                </div>
            </div>
        </section>

    </div>

    <div class="settings-card">
        <div class="field-group" style="margin-bottom: 0;">
            <label>운송 물품/장비명</label>
            <input type="text" id="equip_name" placeholder="예: Nordlys 장비 1대">
        </div>
        <div class="field-group" style="margin-bottom: 0;">
            <label>특이사항 (기사님 전달용)</label>
            <input type="text" id="order_memo" placeholder="전달할 비고 내용을 입력하세요">
        </div>
    </div>

    <div class="action-zone">
        <div style="display:flex; gap:12px; margin-bottom:12px; justify-content:flex-end;">
            <button onclick="resetAll()" style="padding:10px 20px;border:1.5px solid var(--border-soft);border-radius:12px;background:white;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all 0.2s;" onmouseover="this.style.borderColor='#f43f5e';this.style.color='#f43f5e'" onmouseout="this.style.borderColor='var(--border-soft)';this.style.color='var(--text-muted)'">🔄 전체 초기화</button>
        </div>
        <button class="btn-main" onclick="processFinalOutput()">
            Generate Dispatch Message ⚡
        </button>
    </div>

    <div class="result-container">
        <div class="result-header">
            <h2>Generated Message Report</h2>
            <button class="btn-copy" id="copy_trigger" onclick="handleCopyAction()">
                Copy to Clipboard
            </button>
        </div>
        <textarea id="output_box" class="output-box" readonly></textarea>
    </div>

</div>
<datalist id="master_mgrs">
    <option value="김기훈"><option value="오상걸"><option value="박윤아"><option value="김성훈"><option value="이가람"><option value="백승철"><option value="임용철"><option value="박지영">
</datalist>

<script>
    const MASTER_CONTACT_DATA = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541",
        "백승철": "010-5573-3680",
        "임용철": "010-4370-9696",
        "박지영": "010-2315-2884"
    };

    const MASTER_TITLE_DATA = {
        "김성훈": "전무",
        "이가람": "과장",
        "백승철": "부장",
        "오상걸": "부장",
        "임용철": "이사",
        "박윤아": "과장",
        "김기훈": "선임",
        "박지영": "차장"
    };

    const PRESET_LOCATIONS = {
        "용마": {
            display: "김포 용마창고",
            addr: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            lat: 37.6086,
            lng: 126.7628,
            mgr: "김기훈",
            icon: "🏭"
        },
        "켄델라사무실": {
            display: "켄델라 서초 사무실",
            displayOverride: "서초 켄델라",
            addr: "서울 서초구 강남대로 327",
            detail: "3층",
            lat: 37.4965,
            lng: 127.0276,
            mgr: "박윤아",
            icon: "🗼"
        },
        "부산사무소": {
            display: "켄델라 부산 사무소",
            displayOverride: "부산 켄델라",
            addr: "부산 해운대구 센텀중앙로 97",
            detail: "A동 2804호",
            lat: 35.1688,
            lng: 129.1317,
            mgr: "",
            icon: "🌊"
        },
        "제이메디": {
            display: "송파 제이메디",
            addr: "",
            lat: 37.5145,
            lng: 127.1058,
            mgr: "",
            icon: "🏥",
            slim: true
        }
    };

    function renderPresetSidebar() {
        const container = document.getElementById("preset-list");
        if (!container) return;
        container.innerHTML = "";
        Object.entries(PRESET_LOCATIONS).forEach(([key, data]) => {
            const chip = document.createElement("div");
            chip.className = "preset-chip";

            const nameDiv = document.createElement("div");
            nameDiv.className = "preset-chip-name";
            nameDiv.textContent = (data.icon || "📍") + " " + data.display;

            const kwDiv = document.createElement("div");
            kwDiv.className = "preset-chip-keyword";
            kwDiv.textContent = "키워드: " + key;

            const btnUp = document.createElement("button");
            btnUp.className = "preset-btn pickup";
            btnUp.textContent = "↑ 상차";
            btnUp.onclick = () => applyPreset("p", key);

            const btnDown = document.createElement("button");
            btnDown.className = "preset-btn drop";
            btnDown.textContent = "↓ 하차";
            btnDown.onclick = () => applyPreset("d", key);

            const btnRow = document.createElement("div");
            btnRow.className = "preset-chip-btn-row";
            btnRow.appendChild(btnUp);
            btnRow.appendChild(btnDown);

            chip.appendChild(nameDiv);
            chip.appendChild(kwDiv);
            chip.appendChild(btnRow);
            container.appendChild(chip);
        });
    }

    function applyPreset(prefix, key) {
        const data = PRESET_LOCATIONS[key];
        if (!data) return;
        const stateStore = prefix === "p" ? pickupState : dropState;
        stateStore.slim = !!data.slim;
        stateStore.displayOverride = data.displayOverride || "";
        if (data.addr) {
            executeSelection(prefix, data.display, data.addr, data.lat, data.lng, stateStore);
        } else {
            // 주소 없는 프리셋: 장소명만 세팅, 지도 숨김
            document.getElementById(prefix + "_search").value = data.display;
            document.getElementById(prefix + "_addr").value = "";
            stateStore.name = data.display;
            stateStore.addr = "";
            document.getElementById(prefix + "_map_wrap").classList.remove("visible");
        }
        if (data.mgr) {
            document.getElementById(prefix + "_mgr").value = data.mgr;
            refreshPhoneHint(prefix);
        }
        document.getElementById(prefix + "_addr_detail").value = data.detail || "";
        document.getElementById("presetDropdown").classList.remove("open");
        document.getElementById("presetToggleBtn").classList.remove("open");
    }

    function setQuickDate(prefix, type) {
        const input = document.getElementById(prefix + "_date");
        if (type === "clear") { input.value = ""; return; }
        const d = new Date();
        if (type === "tomorrow") d.setDate(d.getDate() + 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        input.value = `${yyyy}-${mm}-${dd}`;
    }

    function resetAll() {
        ["p","d"].forEach(prefix => {
            document.getElementById(prefix + "_search").value = "";
            document.getElementById(prefix + "_addr").value = "";
            document.getElementById(prefix + "_addr_detail").value = "";
            document.getElementById(prefix + "_mgr").value = "";
            document.getElementById(prefix + "_phone").value = "";
            document.getElementById(prefix + "_hint").innerHTML = "";
            document.getElementById(prefix + "_date").value = "";
            document.getElementById(prefix + "_time_txt").value = "";
            document.getElementById(prefix + "_map_wrap").classList.remove("visible");
        });
        document.getElementById("equip_name").value = "";
        document.getElementById("order_memo").value = "";
        document.getElementById("output_box").value = "";
        pickupState = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null, slim: false, displayOverride: "" };
        dropState   = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null, slim: false, displayOverride: "" };
    }

    function togglePresetDropdown() {
        const dd  = document.getElementById("presetDropdown");
        const btn = document.getElementById("presetToggleBtn");
        dd.classList.toggle("open");
        btn.classList.toggle("open");
    }

    const kakaoSearchProvider = null;
    
    let pickupState = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null, slim: false, displayOverride: "" };
    let dropState = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null, slim: false, displayOverride: "" };

    function initializeSearchEngine(prefix, stateStore) {
        const inputDom = document.getElementById(prefix + "_search");
        const portalDom = document.getElementById(prefix + "_portal");

        inputDom.addEventListener("input", function() {
            const query = this.value.trim();
            
            if (!query) {
                portalDom.classList.remove("active");
                document.getElementById(prefix + "_addr").value = "";
                document.getElementById(prefix + "_addr_detail").value = "";
                document.getElementById(prefix + "_mgr").value = "";
                document.getElementById(prefix + "_phone").value = "";
                document.getElementById(prefix + "_hint").innerHTML = "";
                stateStore.name = "";
                stateStore.addr = "";
                stateStore.lat = 0;
                stateStore.lng = 0;
                document.getElementById(prefix + "_map_wrap").classList.remove("visible");
                return;
            }

            const matchedPreset = Object.keys(PRESET_LOCATIONS).find(k => query.includes(k));
            if (matchedPreset) {
                const data = PRESET_LOCATIONS[matchedPreset];
                executeSelection(prefix, data.display, data.addr, data.lat, data.lng, stateStore);
                document.getElementById(prefix + "_addr_detail").value = data.detail || "";
                if (data.mgr) {
                    document.getElementById(prefix + "_mgr").value = data.mgr;
                    refreshPhoneHint(prefix);
                }
                portalDom.classList.remove("active");
                return;
            }

            try {
                window._kakaoPS.keywordSearch(query, (results, status) => {
                    if (status === kakao.maps.services.Status.OK) {
                        renderSearchItems(prefix, results, stateStore);
                    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                        portalDom.innerHTML = '<div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px;">검색 결과가 없습니다</div>';
                        portalDom.classList.add("active");
                    } else {
                        portalDom.innerHTML = '<div style="padding:16px;text-align:center;color:#f43f5e;font-size:13px;">⚠️ 검색 오류가 발생했습니다. 네트워크를 확인해주세요.</div>';
                        portalDom.classList.add("active");
                    }
                });
            } catch(e) {
                portalDom.innerHTML = '<div style="padding:16px;text-align:center;color:#f43f5e;font-size:13px;">⚠️ 카카오 지도 서비스에 연결할 수 없습니다.</div>';
                portalDom.classList.add("active");
            }
        });
    }

    function renderSearchItems(prefix, items, stateStore) {
        const portal = document.getElementById(prefix + "_portal");
        portal.innerHTML = "";

        items.slice(0, 10).forEach(item => {
            const fullAddress = item.road_address_name || item.address_name;
            
            const node = document.createElement("div");
            node.className = "search-item";
            node.innerHTML = `
                <div class="item-place">${item.place_name}</div>
                <div class="item-addr">${fullAddress}</div>
            `;
            
            node.onclick = () => {
                executeSelection(prefix, item.place_name, fullAddress, item.y, item.x, stateStore);
                portal.classList.remove("active");
            };
            portal.appendChild(node);
        });
        
        portal.classList.add("active");
    }

    function executeSelection(prefix, title, address, lat, lng, stateStore) {
        document.getElementById(prefix + "_search").value = title;
        document.getElementById(prefix + "_addr").value = address;
        
        stateStore.name = title;
        stateStore.addr = address;
        stateStore.lat = lat;
        stateStore.lng = lng;

        const wrapDom = document.getElementById(prefix + "_map_wrap");
        wrapDom.classList.add("visible");

        const targetCoord = new kakao.maps.LatLng(lat, lng);
        
        if (!stateStore.map) {
            const mapDom = document.getElementById(prefix + "_map_dom");
            stateStore.map = new kakao.maps.Map(mapDom, { center: targetCoord, level: 3 });
            stateStore.marker = new kakao.maps.Marker({ position: targetCoord, map: stateStore.map });
        } else {
            stateStore.map.setCenter(targetCoord);
            stateStore.marker.setPosition(targetCoord);
            setTimeout(() => stateStore.map.relayout(), 300);
        }
    }

    function parseRegionTag(address) {
        if (!address) return "";
        const parts = address.split(" ");
        const p0 = parts[0];
        const p1 = parts[1] || "";

        if (p0 === "서울특별시" || p0 === "서울") {
            return p1.replace(/구$/, "");
        }
        const doList = ["경기도","경기","강원도","강원","충청북도","충북","충청남도","충남",
                        "전라북도","전북","전라남도","전남","경상북도","경북","경상남도","경남"];
        if (doList.includes(p0)) {
            return p1.replace(/시$|군$/, "");
        }
        if (p0 === "제주특별자치도" || p0 === "제주") {
            return "제주";
        }
        if (p0 === "세종특별자치시" || p0 === "세종") {
            return "세종";
        }
        if (p0.endsWith("광역시")) {
            return p0.replace(/광역시$/, "");
        }
        return p0;
    }

    function refreshPhoneHint(prefix) {
        const nameVal = document.getElementById(prefix + "_mgr").value.trim();
        const hintDom = document.getElementById(prefix + "_hint");
        const phoneDom = document.getElementById(prefix + "_phone");
        const phone = MASTER_CONTACT_DATA[nameVal];
        if (phone) {
            hintDom.innerHTML = `☎️ ${phone} <span style="font-weight:400;color:#94a3b8;margin-left:6px;">· 잘못 선택했다면 × 눌러 수정</span>`;
            phoneDom.value = phone;
        } else {
            hintDom.innerHTML = "";
            phoneDom.value = "";
        }
    }

    function processFinalOutput() {
        function formatDate(dateVal) {
            if (!dateVal) return "";
            const [y, m, d] = dateVal.split("-").map(Number);
            const dt = new Date(y, m - 1, d);
            const days = ["일","월","화","수","목","금","토"];
            return m + "/" + String(d).padStart(2,"0") + "(" + days[dt.getDay()] + ")";
        }
        const pDateStr = formatDate(document.getElementById("p_date").value);
        const pTimeTxt = document.getElementById("p_time_txt").value.trim();
        const pTimeStr = pDateStr ? (pTimeTxt ? pDateStr + " " + pTimeTxt : pDateStr) : (pTimeTxt || "(시간협의)");

        const dDateStr = formatDate(document.getElementById("d_date").value);
        const dTimeTxt = document.getElementById("d_time_txt").value.trim();
        const dTimeStr = dDateStr ? (dTimeTxt ? dDateStr + " " + dTimeTxt : dDateStr) : (dTimeTxt || "(시간협의)");
        const pMgrRaw  = document.getElementById("p_mgr").value.trim();
        const pMgrName = pMgrRaw ? (pMgrRaw + (MASTER_TITLE_DATA[pMgrRaw] ? " " + MASTER_TITLE_DATA[pMgrRaw] : "")) : "(미입력)";
        const dMgrRaw  = document.getElementById("d_mgr").value.trim();
        const dMgrName = dMgrRaw ? (dMgrRaw + (MASTER_TITLE_DATA[dMgrRaw] ? " " + MASTER_TITLE_DATA[dMgrRaw] : "")) : "(미입력)";
        const productTag = document.getElementById("equip_name").value.trim() || "(미입력)";
        const finalMemo = document.getElementById("order_memo").value.trim();

        function buildDisplay(name, region) {
            if (!region) return name;
            if (name.startsWith(region)) return name;
            const cleaned = name
                .replace(new RegExp(region + "\\s*(점|지점|센터|본점|지사|직영점|병원점)?$"), "")
                .trim();
            return region + " " + cleaned;
        }

        const pRegion = parseRegionTag(pickupState.addr);
        const pDisplay = pickupState.displayOverride || buildDisplay(pickupState.name, pRegion);

        const dRegion = parseRegionTag(dropState.addr);
        const dDisplay = dropState.displayOverride || buildDisplay(dropState.name, dRegion);

        let outputMessage = `안녕하세요 팀장님\n아래의 내역 배차 부탁드립니다\n\n[상차 정보]\n`;
        outputMessage += `상차지 : ${pDisplay || "(장소 미선택)"}\n`;
        outputMessage += `일시 : ${pTimeStr}\n`;
        outputMessage += `장비명 : ${productTag}`;
        if (!pickupState.slim) {
            const pDetail = document.getElementById("p_addr_detail").value.trim();
            const pFullAddr = pickupState.addr ? (pDetail ? pickupState.addr + " " + pDetail : pickupState.addr) : "(주소 미선택)";
            outputMessage += `\n주소 : ${pFullAddr}\n`;
            outputMessage += `담당자 : ${pMgrName}`;
            const pPhone = document.getElementById("p_phone").value.trim();
            if (pPhone) outputMessage += `\n연락처 : ${pPhone}`;
        }

        outputMessage += `\n\n[하차 정보]\n`;
        outputMessage += `하차지 : ${dDisplay || "(장소 미선택)"}\n`;
        outputMessage += `일시 : ${dTimeStr}\n`;
        outputMessage += `장비명 : ${productTag}`;
        if (!dropState.slim) {
            const dDetail = document.getElementById("d_addr_detail").value.trim();
            const dFullAddr = dropState.addr ? (dDetail ? dropState.addr + " " + dDetail : dropState.addr) : "(주소 미선택)";
            outputMessage += `\n주소 : ${dFullAddr}\n`;
            outputMessage += `담당자 : ${dMgrName}`;
            const dPhone = document.getElementById("d_phone").value.trim();
            if (dPhone) outputMessage += `\n연락처 : ${dPhone}`;
        }

        if (finalMemo) {
            outputMessage += `\n\n[전달사항]\n${finalMemo}`;
        }
        outputMessage += `\n\n감사합니다!`;

        document.getElementById("output_box").value = outputMessage;
        
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: 'smooth'
        });
    }

    function handleCopyAction() {
        const targetText = document.getElementById("output_box");
        if (!targetText.value) return;

        targetText.select();
        document.execCommand('copy');
        
        const btn = document.getElementById("copy_trigger");
        const prevLabel = btn.innerHTML;
        
        btn.innerHTML = "✅ Message Copied!";
        btn.style.background = "#10b981";
        
        setTimeout(() => {
            btn.innerHTML = prevLabel;
            btn.style.background = "rgba(255,255,255,0.1)";
        }, 2000);
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderPresetSidebar();
        kakao.maps.load(() => {
            window._kakaoPS = new kakao.maps.services.Places();

            initializeSearchEngine("p", pickupState);
            initializeSearchEngine("d", dropState);

            document.getElementById("p_mgr").addEventListener("input", () => refreshPhoneHint("p"));
            document.getElementById("d_mgr").addEventListener("input", () => refreshPhoneHint("d"));

            function formatPhone(input) {
                let v = input.value.replace(/[^0-9]/g, "");
                if (v.length <= 3) {
                    input.value = v;
                } else if (v.length <= 7) {
                    input.value = v.slice(0,3) + "-" + v.slice(3);
                } else {
                    input.value = v.slice(0,3) + "-" + v.slice(3,7) + "-" + v.slice(7,11);
                }
            }
            document.getElementById("p_phone").addEventListener("input", function() { formatPhone(this); });
            document.getElementById("d_phone").addEventListener("input", function() { formatPhone(this); });

            document.addEventListener("click", (evt) => {
                if (!evt.target.closest(".field-group")) {
                    document.querySelectorAll(".search-portal").forEach(p => p.classList.remove("active"));
                }
                if (!evt.target.closest(".preset-bar")) {
                    document.getElementById("presetDropdown").classList.remove("open");
                    document.getElementById("presetToggleBtn").classList.remove("open");
                }
            });

            console.log("System Initialized: All modules active.");
        });
    });

</script>

</body>
</html>
