<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배차 생성기</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #0f3460;
            --surface: #ffffff;
            --surface2: #f7f8fc;
            --border: #e2e5ef;
            --text: #1a1a2e;
            --muted: #7b8196;
            --success: #2ecc71;
            --shadow: 0 2px 16px rgba(26, 26, 46, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #eef1f8;
            min-height: 100vh;
            padding: 32px 16px;
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* 헤더 스타일 */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.2);
        }

        .header-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-text p {
            font-size: 14px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* 패널 레이아웃 */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }

        /* 카드 공통 스타일 */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .badge-up { background: #fff3cd; color: #b45309; }
        .badge-down { background: #d1fae5; color: #065f46; }

        .label-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        /* 입력 필드 스타일 */
        .field {
            margin-bottom: 16px;
            position: relative;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: var(--surface2);
            transition: all 0.2s;
            outline: none;
        }

        .field input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }

        .field input.selected-address {
            border-color: var(--success);
            background: #f0fdf4;
            color: #065f46;
            font-weight: 500;
        }

        /* 검색 드롭다운 */
        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(26, 26, 46, 0.15);
            z-index: 1000;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f0f4ff;
        }

        .place-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .place-addr {
            font-size: 12px;
            color: var(--muted);
        }

        /* 지도 스타일 */
        .map-container {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 1.5px solid var(--border);
            height: 180px;
            display: none;
        }

        .map-container.active {
            display: block;
        }

        /* 비고/장비 카드 */
        .extra-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .extra-card {
                grid-template-columns: 1fr;
            }
        }

        /* 결과 창 스타일 */
        .result-section {
            background: var(--primary);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-area {
            width: 100%;
            height: 280px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            font-family: 'Noto Sans KR', monospace;
            color: #e0e0e0;
            line-height: 1.8;
            resize: none;
            outline: none;
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-generate {
            width: 100%;
            background: var(--accent);
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(233, 69, 96, 0.3);
        }

        .btn-generate:hover {
            background: #d63651;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-copy.copied {
            background: var(--success);
            border-color: var(--success);
        }

        .contact-info {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="header-icon">🚚</div>
        <div class="header-text">
            <h1>배차 메시지 생성기</h1>
            <p>상하차지 정보를 검색하여 최적의 배차 메시지를 만듭니다.</p>
        </div>
    </header>

    <div class="panels">
        <section class="card">
            <div class="card-header">
                <div class="badge badge-up">↑</div>
                <span class="label-title">상차지 정보</span>
            </div>
            
            <div class="field">
                <label>장소 명칭 검색</label>
                <input type="text" id="pickupInput" placeholder="예: 용마, 세예의원, 강남빌딩">
                <div id="pickupDropdown" class="dropdown"></div>
            </div>
            
            <div class="field">
                <label>확정된 주소</label>
                <input type="text" id="pickupAddress" class="selected-address" readonly placeholder="장소를 검색하면 자동 입력됩니다.">
            </div>

            <div id="pickupMapWrap" class="map-container">
                <div id="pickupMap" style="width:100%; height:100%;"></div>
            </div>

            <div class="field" style="margin-top: 16px;">
                <label>상차 예정 시간</label>
                <input type="text" id="pickupTime" placeholder="예: 05/20(월) 09:00">
            </div>

            <div class="field">
                <label>현장 담당자</label>
                <input type="text" id="pickupManager" list="managerList" placeholder="담당자 이름 선택 또는 입력">
                <div id="pickupContactHint" class="contact-info"></div>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <div class="badge badge-down">↓</div>
                <span class="label-title">하차지 정보</span>
            </div>
            
            <div class="field">
                <label>장소 명칭 검색</label>
                <input type="text" id="dropInput" placeholder="예: 켄델라코리아, 신촌병원">
                <div id="dropDropdown" class="dropdown"></div>
            </div>
            
            <div class="field">
                <label>확정된 주소</label>
                <input type="text" id="dropAddress" class="selected-address" readonly placeholder="장소를 검색하면 자동 입력됩니다.">
            </div>

            <div id="dropMapWrap" class="map-container">
                <div id="dropMap" style="width:100%; height:100%;"></div>
            </div>

            <div class="field" style="margin-top: 16px;">
                <label>하차 예정 시간</label>
                <input type="text" id="dropTime" placeholder="예: 05/20(월) 14:00">
            </div>

            <div class="field">
                <label>현장 담당자</label>
                <input type="text" id="dropManager" list="managerList" placeholder="담당자 이름 선택 또는 입력">
                <div id="dropContactHint" class="contact-info"></div>
            </div>
        </section>
    </div>

    <div class="extra-card">
        <div class="field" style="margin-bottom: 0;">
            <label>장비명 / 모델</label>
            <input type="text" id="equipment" placeholder="예: Nordlys, PicoWay 등">
        </div>
        <div class="field" style="margin-bottom: 0;">
            <label>비고 / 요청사항</label>
            <input type="text" id="memo" placeholder="특이사항 입력">
        </div>
    </div>

    <button class="btn btn-generate" onclick="generateMessage()">
        ✨ 배차 메시지 생성하기
    </button>

    <div class="result-section">
        <div class="result-header">
            <h3>생성된 메시지 (복사해서 사용하세요)</h3>
            <button class="btn btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 복사하기</button>
        </div>
        <textarea id="resultTextarea" class="result-area" readonly></textarea>
    </div>
</div>

<datalist id="managerList">
    <option value="김기훈">
    <option value="오상걸">
    <option value="박윤아">
    <option value="김성훈">
    <option value="이가람">
</datalist>

<script>
    // 1. 기본 데이터 설정
    const CONTACTS = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541"
    };

    const QUICK_LOCATIONS = {
        "용마": {
            name: "김포 용마창고",
            address: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            lat: 37.6086,
            lng: 126.7628,
            manager: "김기훈"
        }
    };

    // 2. 카카오 검색 객체 초기화
    const ps = new kakao.maps.services.Places();
    
    // 선택된 데이터를 담을 변수
    let pickupData = { name: "", address: "", lat: null, lng: null };
    let dropData = { name: "", address: "", lat: null, lng: null };

    // 3. 검색 로직 함수
    function initSearch(config) {
        const input = document.getElementById(config.inputId);
        const dropdown = document.getElementById(config.dropdownId);
        const addrDisplay = document.getElementById(config.addressId);
        const managerInput = document.getElementById(config.managerId);
        const hintDisplay = document.getElementById(config.hintId);

        input.addEventListener("input", function() {
            const query = this.value.trim();
            if (!query) {
                dropdown.classList.remove("open");
                return;
            }

            // [A] 단축키 먼저 체크 (용마 등)
            if (QUICK_LOCATIONS[query]) {
                const data = QUICK_LOCATIONS[query];
                applySelection(data.name, data.address, data.lat, data.lng, config);
                if (data.manager) {
                    managerInput.value = data.manager;
                    updateContactHint(config.managerId, config.hintId);
                }
                dropdown.classList.remove("open");
                return;
            }

            // [B] 카카오 장소 검색 API 실행
            ps.keywordSearch(query, (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    displayDropdown(result, config);
                } else {
                    dropdown.classList.remove("open");
                }
            });
        });
    }

    // 4. 드롭다운 렌더링
    function displayDropdown(places, config) {
        const dropdown = document.getElementById(config.dropdownId);
        dropdown.innerHTML = "";

        places.slice(0, 8).forEach(place => {
            const item = document.createElement("div");
            item.className = "dropdown-item";
            item.innerHTML = `
                <div class="place-name">${place.place_name}</div>
                <div class="place-addr">${place.address_name}</div>
            `;
            item.onclick = () => {
                applySelection(place.place_name, place.address_name, place.y, place.x, config);
                dropdown.classList.remove("open");
            };
            dropdown.appendChild(item);
        });
        dropdown.classList.add("open");
    }

    // 5. 장소 선택 적용 (핵심)
    function applySelection(name, address, lat, lng, config) {
        const input = document.getElementById(config.inputId);
        const addrDisplay = document.getElementById(config.addressId);
        
        input.value = name;
        addrDisplay.value = address;
        
        // 데이터 저장
        config.store.name = name;
        config.store.address = address;
        config.store.lat = lat;
        config.store.lng = lng;

        // 지도 표시
        showMapOnCard(config.mapWrapId, config.mapDivId, lat, lng, config.store);
    }

    // 6. 지도 렌더링
    function showMapOnCard(wrapId, divId, lat, lng, store) {
        const wrap = document.getElementById(wrapId);
        wrap.classList.add("active");
        
        const coords = new kakao.maps.LatLng(lat, lng);
        
        if (!store._mapInstance) {
            const mapContainer = document.getElementById(divId);
            const mapOption = { center: coords, level: 3 };
            store._mapInstance = new kakao.maps.Map(mapContainer, mapOption);
            store._markerInstance = new kakao.maps.Marker({
                position: coords,
                map: store._mapInstance
            });
        } else {
            store._mapInstance.setCenter(coords);
            store._markerInstance.setPosition(coords);
            // 가끔 지도가 깨지는 현상 방지
            setTimeout(() => store._mapInstance.relayout(), 100);
        }
    }

    // 7. 담당자 연락처 힌트 업데이트
    function updateContactHint(managerId, hintId) {
        const name = document.getElementById(managerId).value.trim();
        const hint = document.getElementById(hintId);
        const phone = CONTACTS[name] || "";
        
        if (phone) {
            hint.innerHTML = `<span>📞</span> ${phone}`;
        } else {
            hint.innerHTML = "";
        }
    }

    // 8. 주소에서 '서초' 같은 지역명 추출 (핵심 요청 기능)
    function getRegionPrefix(address) {
        if (!address) return "";
        
        // 주소를 공백으로 나눔 (예: 서울 서초구 서초동 -> ["서울", "서초구", "서초동"])
        const parts = address.split(" ");
        
        if (parts.length > 1) {
            // 두 번째 단어(서초구)를 가져와서 '구', '시', '군' 글자를 제거함
            let region = parts[1].replace(/구$|시$|군$/, "");
            return region;
        }
        return "";
    }

    // 9. 최종 메시지 생성
    function generateMessage() {
        const pTime = document.getElementById("pickupTime").value.trim() || "(조율필요)";
        const dTime = document.getElementById("dropTime").value.trim() || "(조율필요)";
        const pMgr = document.getElementById("pickupManager").value.trim() || "(미입력)";
        const dMgr = document.getElementById("dropManager").value.trim() || "(미입력)";
        const equip = document.getElementById("equipment").value.trim() || "(미입력)";
        const memo = document.getElementById("memo").value.trim();

        // [지역명 + 장소명] 조합 로직 (예: 서초 세예의원)
        const pRegion = getRegionPrefix(pickupData.address);
        const pDisplayName = pRegion ? `${pRegion} ${pickupData.name}` : pickupData.name;

        const dRegion = getRegionPrefix(dropData.address);
        const dDisplayName = dRegion ? `${dRegion} ${dropData.name}` : dropData.name;

        let msg = `[상차]\n`;
        msg += `상차 : ${pDisplayName || "(미선택)"}\n`;
        msg += `일시 : ${pTime}\n`;
        msg += `장비명 : ${equip}\n`;
        msg += `주소 : ${pickupData.address || "(미선택)"}\n`;
        msg += `담당자 : ${pMgr}`;
        if (CONTACTS[pMgr]) msg += ` (${CONTACTS[pMgr]})`;

        msg += `\n\n[하차]\n`;
        msg += `하차 : ${dDisplayName || "(미선택)"}\n`;
        msg += `일시 : ${dTime}\n`;
        msg += `장비명 : ${equip}\n`;
        msg += `주소 : ${dropData.address || "(미선택)"}\n`;
        msg += `담당자 : ${dMgr}`;
        if (CONTACTS[dMgr]) msg += ` (${CONTACTS[dMgr]})`;

        if (memo) {
            msg += `\n\n[비고]\n${memo}`;
        }

        document.getElementById("resultTextarea").value = msg;
    }

    // 10. 복사 기능
    function copyToClipboard() {
        const textarea = document.getElementById("resultTextarea");
        if (!textarea.value) return;

        textarea.select();
        document.execCommand('copy');

        const btn = document.getElementById("copyBtn");
        const originalText = btn.innerHTML;
        btn.innerHTML = "✅ 복사완료!";
        btn.classList.add("copied");

        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.remove("copied");
        }, 2000);
    }

    // 11. 이벤트 리스너 및 초기화
    document.addEventListener("DOMContentLoaded", () => {
        // 상차지 검색 초기화
        initSearch({
            inputId: "pickupInput",
            dropdownId: "pickupDropdown",
            addressId: "pickupAddress",
            mapWrapId: "pickupMapWrap",
            mapDivId: "pickupMap",
            managerId: "pickupManager",
            hintId: "pickupContactHint",
            store: pickupData
        });

        // 하차지 검색 초기화
        initSearch({
            inputId: "dropInput",
            dropdownId: "dropDropdown",
            addressId: "dropAddress",
            mapWrapId: "dropMapWrap",
            mapDivId: "dropMap",
            managerId: "dropManager",
            hintId: "dropContactHint",
            store: dropData
        });

        // 담당자 연락처 실시간 업데이트 이벤트
        document.getElementById("pickupManager").addEventListener("input", () => {
            updateContactHint("pickupManager", "pickupContactHint");
        });
        document.getElementById("dropManager").addEventListener("input", () => {
            updateContactHint("dropManager", "dropContactHint");
        });

        // 외부 클릭 시 드롭다운 닫기
        document.addEventListener("click", (e) => {
            if (!e.target.closest('.field')) {
                document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
            }
        });
    });
</script>

</body>
</html>
