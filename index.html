<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운송 배차 메시지 생성기 | Enterprise</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           [1. CSS VARIABLES & THEME CONFIGURATION]
           ==================================================
        */
        :root {
            /* Palette Definition */
            --navy-deep: #0f172a;
            --navy-light: #1e293b;
            --accent-red: #f43f5e;
            --accent-red-hover: #e11d48;
            --success-green: #10b981;
            --warning-amber: #f59e0b;
            --bg-main: #f8fafc;
            --border-soft: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;

            /* Shadows & Effects */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --transition-std: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================================================
           [2. GLOBAL RESET & BASE STYLES]
           ==================================================
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 60px 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar Customization */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==================================================
           [3. LAYOUT COMPONENTS]
           ==================================================
        */
        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 30px;
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--navy-deep), var(--navy-light));
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-md);
        }

        .brand-text h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--navy-deep);
        }

        .brand-text p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ==================================================
           [4. FORM GRID & CARDS]
           ==================================================
        */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        @media (max-width: 960px) {
            .grid-container { grid-template-columns: 1fr; }
        }

        .data-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-std);
            position: relative;
            overflow: hidden;
        }

        .data-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        /* Card Header Badges */
        .card-type-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .type-pickup { background: #fee2e2; color: #991b1b; }
        .type-drop { background: #dcfce7; color: #166534; }

        /* ==================================================
           [5. INPUT FIELDS & SEARCH BOX]
           ==================================================
        */
        .field-group {
            margin-bottom: 24px;
            position: relative;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .field-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 15px;
            background: #f8fafc;
            color: var(--text-main);
            transition: var(--transition-std);
            outline: none;
        }

        .field-group input:focus {
            border-color: var(--accent-red);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }

        /* Readonly / Auto-filled Style */
        .field-group input[readonly] {
            background-color: #f1f5f9;
            color: var(--text-muted);
            border-color: var(--border-soft);
            cursor: not-allowed;
            font-weight: 500;
        }

        /* Search Dropdown Results */
        .search-portal {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-soft);
            z-index: 1000;
            margin-top: 8px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
        }

        .search-portal.active { display: block; animation: slideDown 0.2s ease; }

        .search-item {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .search-item:hover { background: #fdf2f2; }

        .item-place { font-weight: 700; font-size: 15px; color: var(--navy-deep); }
        .item-addr { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* ==================================================
           [6. INTERACTIVE MAP SECTION]
           ==================================================
        */
        .map-canvas {
            width: 100%;
            height: 200px;
            background: #f1f5f9;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-soft);
            display: none;
            overflow: hidden;
        }

        .map-canvas.visible { display: block; }

        /* ==================================================
           [7. GLOBAL SETTINGS AREA]
           ==================================================
        */
        .settings-card {
            background: var(--white);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border-soft);
            margin-bottom: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 600px) { .settings-card { grid-template-columns: 1fr; } }

        /* ==================================================
           [8. ACTION BUTTONS & OUTPUT]
           ==================================================
        */
        .action-zone {
            margin-top: 40px;
        }

        .btn-main {
            width: 100%;
            padding: 22px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);
            transition: var(--transition-std);
        }

        .btn-main:hover {
            background: var(--accent-red-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(244, 63, 94, 0.5);
        }

        .result-container {
            margin-top: 50px;
            background: var(--navy-deep);
            border-radius: 32px;
            padding: 48px;
            box-shadow: var(--shadow-lg);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .result-header h2 {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-copy {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }

        .btn-copy:hover { background: rgba(255,255,255,0.2); }

        .output-box {
            width: 100%;
            height: 420px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            color: #e2e8f0;
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            line-height: 1.8;
            resize: none;
            outline: none;
        }

        /* ==================================================
           [9. UTILITY CLASSES]
           ==================================================
        */
        .mgr-hint {
            font-size: 12px;
            color: var(--accent-red);
            font-weight: 700;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="wrapper">
    <header class="header-section">
        <div class="brand-group">
            <div class="logo-mark">🚚</div>
            <div class="brand-text">
                <h1>Logistics Dispatcher Pro</h1>
                <p>Enterprise Management System v5.0.1</p>
            </div>
        </div>
        <div style="text-align: right;">
            <span style="font-size: 12px; color: var(--text-muted);">Status: Ready</span>
            <div style="font-weight: 700; color: var(--success-green);">● System Online</div>
        </div>
    </header>

    <div class="grid-container">
        
        <section class="data-card">
            <span class="card-type-badge type-pickup">상차지 정보 (Pickup)</span>
            
            <div class="field-group">
                <label>장소 명칭 검색</label>
                <input type="text" id="p_search" placeholder="병원명/창고명 검색 (예: 용마)">
                <div id="p_portal" class="search-portal"></div>
            </div>

            <div class="field-group">
                <label>자동 매칭 전체 주소</label>
                <input type="text" id="p_addr" readonly placeholder="장소 선택 시 자동 입력">
            </div>

            <div id="p_map_wrap" class="map-canvas">
                <div id="p_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="field-group" style="margin-top: 24px;">
                <label>상차 스케줄</label>
                <input type="text" id="p_time" placeholder="예: 05/20(월) 오전 09시">
            </div>

            <div class="field-group">
                <label>현장 담당자</label>
                <input type="text" id="p_mgr" list="master_mgrs" placeholder="성함 입력">
                <div id="p_hint" class="mgr-hint"></div>
            </div>
        </section>

        <section class="data-card">
            <span class="card-type-badge type-drop">하차지 정보 (Drop-off)</span>

            <div class="field-group">
                <label>하차 장소 검색</label>
                <input type="text" id="d_search" placeholder="도착 병원명/기관명 검색">
                <div id="d_portal" class="search-portal"></div>
            </div>

            <div class="field-group">
                <label>자동 매칭 전체 주소</label>
                <input type="text" id="d_addr" readonly placeholder="장소 선택 시 자동 입력">
            </div>

            <div id="d_map_wrap" class="map-canvas">
                <div id="d_map_dom" style="width:100%; height:100%;"></div>
            </div>

            <div class="field-group" style="margin-top: 24px;">
                <label>하차 스케줄</label>
                <input type="text" id="d_time" placeholder="예: 05/20(월) 오후 02시">
            </div>

            <div class="field-group">
                <label>수령 담당자</label>
                <input type="text" id="d_mgr" list="master_mgrs" placeholder="성함 입력">
                <div id="d_hint" class="mgr-hint"></div>
            </div>
        </section>

    </div> <div class="settings-card">
        <div class="field-group" style="margin-bottom: 0;">
            <label>운송 물품/장비명</label>
            <input type="text" id="equip_name" placeholder="예: Nordlys 장비 1대">
        </div>
        <div class="field-group" style="margin-bottom: 0;">
            <label>특이사항 (기사님 전달용)</label>
            <input type="text" id="order_memo" placeholder="전달할 비고 내용을 입력하세요">
        </div>
    </div>

    <div class="action-zone">
        <button class="btn-main" onclick="processFinalOutput()">
            Generate Dispatch Message ⚡
        </button>
    </div>

    <div class="result-container">
        <div class="result-header">
            <h2>Generated Message Report</h2>
            <button class="btn-copy" id="copy_trigger" onclick="handleCopyAction()">
                Copy to Clipboard
            </button>
        </div>
        <textarea id="output_box" class="output-box" readonly></textarea>
    </div>

</div> <datalist id="master_mgrs">
    <option value="김기훈"><option value="오상걸"><option value="박윤아"><option value="김성훈"><option value="이가람">
</datalist>

<script>
    /**
     * @constant MASTER_CONTACT_DATA
     * 담당자별 고유 연락처 매핑 테이블
     */
    const MASTER_CONTACT_DATA = {
        "김기훈": "010-3899-1656",
        "오상걸": "010-9969-0149",
        "박윤아": "010-3020-0568",
        "김성훈": "010-5419-6263",
        "이가람": "010-9294-6541"
    };

    /**
     * @constant PRESET_LOCATIONS
     * 빈번하게 발생하는 장소의 프리셋 데이터 (용마창고 등)
     */
    const PRESET_LOCATIONS = {
        "용마": {
            display: "김포 용마창고",
            addr: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
            lat: 37.6086,
            lng: 126.7628,
            mgr: "김기훈"
        }
    };

    /**
     * @global State Management
     * 상차 및 하차 포인트의 상태 객체
     */
    const kakaoSearchProvider = new kakao.maps.services.Places();
    
    let pickupState = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null };
    let dropState = { name: "", addr: "", lat: 0, lng: 0, map: null, marker: null };

    /**
     * @function initializeSearchEngine
     * 검색 인풋과 드롭다운 포털을 연결하는 메인 엔진
     */
    function initializeSearchEngine(prefix, stateStore) {
        const inputDom = document.getElementById(prefix + "_search");
        const portalDom = document.getElementById(prefix + "_portal");

        inputDom.addEventListener("input", function() {
            const query = this.value.trim();
            
            if (!query) {
                portalDom.classList.remove("active");
                return;
            }

            // [Step 1] 프리셋 키워드 우선 체크
            if (PRESET_LOCATIONS[query]) {
                const data = PRESET_LOCATIONS[query];
                executeSelection(prefix, data.display, data.addr, data.lat, data.lng, stateStore);
                
                if (data.mgr) {
                    document.getElementById(prefix + "_mgr").value = data.mgr;
                    refreshPhoneHint(prefix);
                }
                portalDom.classList.remove("active");
                return;
            }

            // [Step 2] 카카오 맵 API 실시간 키워드 검색 수행
            kakaoSearchProvider.keywordSearch(query, (results, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    renderSearchItems(prefix, results, stateStore);
                } else {
                    portalDom.classList.remove("active");
                }
            });
        });
    }

    /**
     * @function renderSearchItems
     * API 검색 결과를 HTML 리스트로 변환하여 렌더링
     */
    function renderSearchItems(prefix, items, stateStore) {
        const portal = document.getElementById(prefix + "_portal");
        portal.innerHTML = "";

        // 최대 상위 10개 결과 노출
        items.slice(0, 10).forEach(item => {
            // 도로명 주소(road_address_name)를 우선 채택
            const fullAddress = item.road_address_name || item.address_name;
            
            const node = document.createElement("div");
            node.className = "search-item";
            node.innerHTML = `
                <div class="item-place">${item.place_name}</div>
                <div class="item-addr">${fullAddress}</div>
            `;
            
            node.onclick = () => {
                executeSelection(prefix, item.place_name, fullAddress, item.y, item.x, stateStore);
                portal.classList.remove("active");
            };
            portal.appendChild(node);
        });
        
        portal.classList.add("active");
    }

    /**
     * @function executeSelection
     * 사용자가 특정 장소를 선택했을 때 데이터를 바인딩하고 지도를 갱신
     */
    function executeSelection(prefix, title, address, lat, lng, stateStore) {
        // UI 값 동기화
        document.getElementById(prefix + "_search").value = title;
        document.getElementById(prefix + "_addr").value = address;
        
        // 상태 저장
        stateStore.name = title;
        stateStore.addr = address;
        stateStore.lat = lat;
        stateStore.lng = lng;

        // 지도 가시화
        const wrapDom = document.getElementById(prefix + "_map_wrap");
        wrapDom.classList.add("visible");

        const targetCoord = new kakao.maps.LatLng(lat, lng);
        
        // 지도 인스턴스 초기화 또는 갱신
        if (!stateStore.map) {
            const mapDom = document.getElementById(prefix + "_map_dom");
            stateStore.map = new kakao.maps.Map(mapDom, { center: targetCoord, level: 3 });
            stateStore.marker = new kakao.maps.Marker({ position: targetCoord, map: stateStore.map });
        } else {
            stateStore.map.setCenter(targetCoord);
            stateStore.marker.setPosition(targetCoord);
            // 렌더링 타이밍 보정
            setTimeout(() => stateStore.map.relayout(), 100);
        }
    }

    /**
     * @function parseRegionTag
     * 주소 문자열로부터 '구/시' 명칭을 추출하여 라벨화
     */
    function parseRegionTag(address) {
        if (!address) return "";
        const parts = address.split(" ");
        if (parts.length > 1) {
            // 주소 두 번째 단어에서 행정구역 접미사 제거 (예: 서초구 -> 서초)
            return parts[1].replace(/구$|시$|군$/, "");
        }
        return "";
    }

    /**
     * @function refreshPhoneHint
     * 담당자 선택 시 연락처 미리보기를 업데이트
     */
    function refreshPhoneHint(prefix) {
        const nameVal = document.getElementById(prefix + "_mgr").value.trim();
        const hintDom = document.getElementById(prefix + "_hint");
        
        if (MASTER_CONTACT_DATA[nameVal]) {
            hintDom.innerHTML = `☎️ ${MASTER_CONTACT_DATA[nameVal]}`;
        } else {
            hintDom.innerHTML = "";
        }
    }

    /**
     * @function processFinalOutput
     * 모든 입력 데이터를 취합하여 최종 메시지 문자열 생성
     */
    function processFinalOutput() {
        // 폼 필드 데이터 수집
        const pTimeStr = document.getElementById("p_time").value.trim() || "(시간협의)";
        const dTimeStr = document.getElementById("d_time").value.trim() || "(시간협의)";
        const pMgrName = document.getElementById("p_mgr").value.trim() || "(미입력)";
        const dMgrName = document.getElementById("d_mgr").value.trim() || "(미입력)";
        const productTag = document.getElementById("equip_name").value.trim() || "(미입력)";
        const finalMemo = document.getElementById("order_memo").value.trim();

        // 스마트 명칭 조합 로직 (지역 + 장소명)
        const pRegion = parseRegionTag(pickupState.addr);
        const pDisplay = pRegion ? `${pRegion} ${pickupState.name}` : pickupState.name;

        const dRegion = parseRegionTag(dropState.addr);
        const dDisplay = dRegion ? `${dRegion} ${dropState.name}` : dropState.name;

        // 템플릿 엔진 구동
        let outputMessage = `[상차 정보]\n`;
        outputMessage += `상차지 : ${pDisplay || "(장소 미선택)"}\n`;
        outputMessage += `일시 : ${pTimeStr}\n`;
        outputMessage += `장비명 : ${productTag}\n`;
        outputMessage += `주소 : ${pickupState.addr || "(주소 미선택)"}\n`;
        outputMessage += `담당자 : ${pMgrName}`;
        if (MASTER_CONTACT_DATA[pMgrName]) outputMessage += ` (${MASTER_CONTACT_DATA[pMgrName]})`;

        outputMessage += `\n\n[하차 정보]\n`;
        outputMessage += `하차지 : ${dDisplay || "(장소 미선택)"}\n`;
        outputMessage += `일시 : ${dTimeStr}\n`;
        outputMessage += `장비명 : ${productTag}\n`;
        outputMessage += `주소 : ${dropState.addr || "(주소 미선택)"}\n`;
        outputMessage += `담당자 : ${dMgrName}`;
        if (MASTER_CONTACT_DATA[dMgrName]) outputMessage += ` (${MASTER_CONTACT_DATA[dMgrName]})`;

        // 비고 섹션 추가 (있는 경우에만)
        if (finalMemo) {
            outputMessage += `\n\n[전달사항]\n${finalMemo}`;
        }

        // 출력 박스 업데이트
        document.getElementById("output_box").value = outputMessage;
        
        // 스크롤 이동
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: 'smooth'
        });
    }

    /**
     * @function handleCopyAction
     * 결과물을 클립보드에 복사하고 UI 피드백 제공
     */
    function handleCopyAction() {
        const targetText = document.getElementById("output_box");
        if (!targetText.value) return;

        targetText.select();
        document.execCommand('copy');
        
        const btn = document.getElementById("copy_trigger");
        const prevLabel = btn.innerHTML;
        
        btn.innerHTML = "✅ Message Copied!";
        btn.style.background = "#10b981";
        
        setTimeout(() => {
            btn.innerHTML = prevLabel;
            btn.style.background = "rgba(255,255,255,0.1)";
        }, 2000);
    }

    /**
     * @event DOMContentLoaded
     * 페이지 로드 즉시 엔진 가동 및 이벤트 리스너 등록
     */
    document.addEventListener("DOMContentLoaded", () => {
        // 검색 엔진 독립 인스턴스 초기화
        initializeSearchEngine("p", pickupState);
        initializeSearchEngine("d", dropState);
        
        // 담당자 입력 필드 리스너
        document.getElementById("p_mgr").addEventListener("input", () => refreshPhoneHint("p"));
        document.getElementById("d_mgr").addEventListener("input", () => refreshPhoneHint("d"));
        
        // 검색 드롭다운 외부 클릭 시 닫기 처리
        document.addEventListener("click", (evt) => {
            if (!evt.target.closest(".field-group")) {
                document.querySelectorAll(".search-portal").forEach(p => p.classList.remove("active"));
            }
        });

        console.log("System Initialized: All modules active.");
    });

</script>
