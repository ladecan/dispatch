<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운송 배차 매니저 - 자동 주소 최적화</title>
    
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* --------------------------------------------------
           [1] CSS UI/UX THEME DESIGN
           -------------------------------------------------- */
        :root {
            --primary-navy: #1a1a2e;
            --accent-pink: #e94560;
            --deep-dark: #16213e;
            --body-bg: #f0f2f8;
            --white: #ffffff;
            --gray-text: #6b7280;
            --border-light: #e5e7eb;
            --success-color: #10b981;
            --pickup-accent: #f59e0b;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--body-bg);
            color: var(--primary-navy);
            padding: 50px 25px;
            line-height: 1.6;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
        }

        /* 헤더 섹션 디자인 */
        .app-header {
            text-align: left;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            padding-left: 10px;
        }

        .header-logo {
            width: 70px;
            height: 70px;
            background: var(--primary-navy);
            color: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: var(--shadow-lg);
        }

        .header-info h1 {
            font-size: 30px;
            font-weight: 900;
            color: var(--primary-navy);
            letter-spacing: -1.2px;
        }

        .header-info p {
            color: var(--gray-text);
            font-size: 15px;
        }

        /* 카드 그리드 레이아웃 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 950px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-card {
            background: var(--white);
            border-radius: 32px;
            padding: 45px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        /* 카드 구분 배지 */
        .card-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .badge-pickup { background: #fef3c7; color: #92400e; }
        .badge-drop { background: #d1fae5; color: #065f46; }

        /* --------------------------------------------------
           [2] FORM ELEMENTS STYLE
           -------------------------------------------------- */
        .input-block {
            margin-bottom: 25px;
            position: relative;
        }

        .input-block label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-text);
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .input-block input {
            width: 100%;
            padding: 17px 22px;
            border: 2px solid #edeff5;
            border-radius: 16px;
            font-size: 16px;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-block input:focus {
            border-color: var(--accent-pink);
            background: #ffffff;
            box-shadow: 0 0 0 5px rgba(233, 69, 96, 0.1);
        }

        /* 자동 주소 강조 색상 */
        .input-block input.auto-filled {
            border-color: var(--success-color);
            background: #f0fdf4;
            color: #065f46;
            font-weight: 600;
        }

        /* 검색 드롭다운 */
        .search-suggest {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 1000;
            margin-top: 10px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border-light);
        }

        .search-suggest.active {
            display: block;
        }

        .suggest-item {
            padding: 18px 25px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.2s;
        }

        .suggest-item:hover {
            background-color: #f4f7ff;
        }

        .suggest-title {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary-navy);
        }

        .suggest-addr {
            font-size: 13px;
            color: var(--gray-text);
            margin-top: 4px;
        }

        /* --------------------------------------------------
           [3] MAP & BUTTONS & OUTPUT
           -------------------------------------------------- */
        .map-view {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            margin-top: 20px;
            border: 2px solid #edeff5;
            display: none;
            overflow: hidden;
        }

        .map-view.visible {
            display: block;
        }

        .action-button {
            width: 100%;
            padding: 24px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .action-button:hover {
            transform: translateY(-5px);
            background: #d63651;
        }

        .result-panel {
            margin-top: 50px;
            background: var(--primary-navy);
            border-radius: 40px;
            padding: 50px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .result-header h2 {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .final-textarea {
            width: 100%;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            color: #f1f5f9;
            font-family: 'Noto Sans KR', monospace;
            font-size: 17px;
            line-height: 2.0;
            resize: none;
            outline: none;
        }

        .mgr-hint {
            font-size: 13px;
            color: var(--accent-pink);
            font-weight: 800;
            margin-top: 8px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <div class="header-logo">🚛</div>
        <div class="header-info">
            <h1>배차 정보 마스터 PRO</h1>
            <p>전체 주소와 담당자 정보를 자동으로 매칭하여 배차 메시지를 생성합니다.</p>
        </div>
    </header>

    <div class="main-grid">
        <div class="info-card">
            <span class="card-badge badge-pickup">PICKUP 상차</span>
            
            <div class="input-block">
                <label>장소/병원/건물명 검색</label>
                <input type="text" id="p_search" placeholder="장소를 입력하세요 (예: 용마)">
                <div id="p_dropdown" class="search-suggest"></div>
            </div>

            <div class="input-block">
                <label>전체 주소 (자동 입력)</label>
                <input type="text" id="p_addr" class="auto-filled" readonly placeholder="검색 시 전체 주소가 입력됩니다.">
            </div>

            <div id="p_map_wrap" class="map-view">
                <div id="p_map" style="width:100%; height:100%;"></div>
            </div>

            <div class="input-block" style="margin-top: 30px;">
                <label>상차 희망 일시</label>
                <input type="text" id="p_time" placeholder="예: 05/20(월) 오전 10시">
            </div>

            <div class="input-block">
                <label>상차 담당자</label>
                <input type="text" id="p_mgr" list="mgr_list" placeholder="담당자 이름">
                <div id="p_hint" class="mgr-hint"></div>
            </div>
        </div>

        <div class="info-card">
            <span class="card-badge badge-drop">DROP OFF 하차</span>

            <div class="input-block">
                <label>하차지 명칭 검색</label>
                <input type="text" id="d_search" placeholder="병원명 또는 건물명 검색">
                <div id="d_dropdown" class="search-suggest"></div>
            </div>

            <div class="input-block">
                <label>전체 주소 (자동 입력)</label>
                <input type="text" id="d_addr" class="auto-filled" readonly placeholder="검색 시 전체 주소가 입력됩니다.">
            </div>

            <div id="d_map_wrap" class="map-view">
                <div id="d_map" style="width:100%; height:100%;"></div>
            </div>

            <div class="input-block" style="margin-top: 30px;">
                <label>하차 희망 일시</label>
                <input type="text" id="d_time" placeholder="예: 05/20(월) 오후 3시">
            </div>

            <div class="input-block">
                <label>하차 담당자</label>
                <input type="text" id="d_mgr" list="mgr_list" placeholder="담당자 이름">
                <div id="d_hint" class="mgr-hint"></div>
            </div>
        </div>
    </div>

    <div class="info-card" style="margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="input-block" style="margin-bottom: 0;">
            <label>운송 장비명</label>
            <input type="text" id="equip" placeholder="예: Nordlys, PicoWay">
        </div>
        <div class="input-block" style="margin-bottom: 0;">
            <label>기사님 전달 메모</label>
            <input type="text" id="memo" placeholder="비고 사항 입력">
        </div>
    </div>

    <button class="action-button" onclick="buildMessage()">⚡ 배차 메시지 생성 완료</button>

    <div class="result-panel">
        <div class="result-header">
            <h2>Ready to Copy</h2>
            <button class="copy-btn" id="copy_btn" onclick="copyResult()">📋 클립보드 복사</button>
        </div>
        <textarea id="output" class="final-textarea" readonly></textarea>
    </div>
</div>

<datalist id="mgr_list">
    <option value="김기훈"><option value="오상걸"><option value="박윤아"><option value="김성훈"><option value="이가람">
</datalist>

<script>
/* --------------------------------------------------
   [1] GLOBAL CONSTANTS & DATA
   -------------------------------------------------- */
const CONTACTS = {
    "김기훈": "010-3899-1656",
    "오상걸": "010-9969-0149",
    "박윤아": "010-3020-0568",
    "김성훈": "010-5419-6263",
    "이가람": "010-9294-6541"
};

const PRESETS = {
    "용마": {
        name: "김포 용마창고",
        addr: "경기도 김포시 고촌읍 아라육로 58번길 35-28",
        lat: 37.6086,
        lng: 126.7628,
        mgr: "김기훈"
    }
};

/* --------------------------------------------------
   [2] SEARCH LOGIC & AUTO FILLING
   -------------------------------------------------- */
const kakaoPlaces = new kakao.maps.services.Places();
let pData = { title: "", addr: "", lat: 0, lng: 0, map: null, marker: null };
let dData = { title: "", addr: "", lat: 0, lng: 0, map: null, marker: null };

function setupSearch(prefix, store) {
    const input = document.getElementById(prefix + "_search");
    const dropdown = document.getElementById(prefix + "_dropdown");

    input.addEventListener("input", function() {
        const val = this.value.trim();
        if (!val) { dropdown.classList.remove("active"); return; }

        // [A] 프리셋 검사
        if (PRESETS[val]) {
            const p = PRESETS[val];
            applySelection(prefix, p.name, p.addr, p.lat, p.lng, store);
            if (p.mgr) {
                document.getElementById(prefix + "_mgr").value = p.mgr;
                syncPhoneHint(prefix);
            }
            dropdown.classList.remove("active");
            return;
        }

        // [B] API 실시간 검색
        kakaoPlaces.keywordSearch(val, (data, status) => {
            if (status === kakao.maps.services.Status.OK) {
                renderDropdown(prefix, data, store);
            } else {
                dropdown.classList.remove("active");
            }
        });
    });
}

function renderDropdown(prefix, list, store) {
    const dropdown = document.getElementById(prefix + "_dropdown");
    dropdown.innerHTML = "";

    list.slice(0, 10).forEach(item => {
        // [핵심 로직] 도로명 주소 + 빌딩명/상세정보 결합 시도
        // 카카오 API는 item.road_address_name을 기본으로 주며, 
        // 장소 데이터(item.place_name)를 통해 건물명을 유추할 수 있음.
        let fullAddr = item.road_address_name || item.address_name;
        
        // 검색 결과 장소명(병원명 등)이 주소에 포함되어 있지 않은 경우 괄호로 병기하여 기사님 가독성 높임
        const displayAddr = fullAddr;

        const row = document.createElement("div");
        row.className = "suggest-item";
        row.innerHTML = `
            <div class="suggest-title">${item.place_name}</div>
            <div class="suggest-addr">${displayAddr}</div>
        `;
        
        row.onclick = () => {
            applySelection(prefix, item.place_name, displayAddr, item.y, item.x, store);
            dropdown.classList.remove("active");
        };
        dropdown.appendChild(row);
    });
    dropdown.classList.add("active");
}

/* --------------------------------------------------
   [3] DATA APPLICATION & MAP UPDATE
   -------------------------------------------------- */
function applySelection(prefix, name, addr, lat, lng, store) {
    document.getElementById(prefix + "_search").value = name;
    document.getElementById(prefix + "_addr").value = addr;
    
    store.title = name;
    store.addr = addr;
    store.lat = lat;
    store.lng = lng;

    const wrap = document.getElementById(prefix + "_map_wrap");
    wrap.classList.add("visible");

    const pos = new kakao.maps.LatLng(lat, lng);
    if (!store.map) {
        const dom = document.getElementById(prefix + "_map");
        store.map = new kakao.maps.Map(dom, { center: pos, level: 3 });
        store.marker = new kakao.maps.Marker({ position: pos, map: store.map });
    } else {
        store.map.setCenter(pos);
        store.marker.setPosition(pos);
        setTimeout(() => store.map.relayout(), 150);
    }
}

/* --------------------------------------------------
   [4] REGION LABEL EXTRACTION
   -------------------------------------------------- */
function getRegionLabel(address) {
    if (!address) return "";
    const tokens = address.split(" ");
    // 두 번째 단어(예: 서초구)에서 '구'를 떼고 '서초'만 반환
    if (tokens.length > 1) {
        return tokens[1].replace(/구$|시$|군$/, "");
    }
    return "";
}

function syncPhoneHint(prefix) {
    const name = document.getElementById(prefix + "_mgr").value.trim();
    const hint = document.getElementById(prefix + "_hint");
    if (CONTACTS[name]) {
        hint.innerText = "📞 " + CONTACTS[name];
    } else {
        hint.innerText = "";
    }
}

/* --------------------------------------------------
   [5] FINAL MESSAGE COMPOSITION
   -------------------------------------------------- */
function buildMessage() {
    const pTime = document.getElementById("p_time").value.trim() || "(시간협의)";
    const dTime = document.getElementById("d_time").value.trim() || "(시간협의)";
    const pMgr = document.getElementById("p_mgr").value.trim() || "(미입력)";
    const dMgr = document.getElementById("d_mgr").value.trim() || "(미입력)";
    const equipment = document.getElementById("equip").value.trim() || "(미입력)";
    const memo = document.getElementById("memo").value.trim();

    // 지역명 + 장소명 (예: 서초 세예의원)
    const pRegion = getRegionLabel(pData.addr);
    const pFormattedName = pRegion ? `${pRegion} ${pData.title}` : pData.title;

    const dRegion = getRegionLabel(dData.addr);
    const dFormattedName = dRegion ? `${dRegion} ${dData.title}` : dData.title;

    let res = `[상차]\n`;
    res += `상차 : ${pFormattedName || "(미선택)"}\n`;
    res += `일시 : ${pTime}\n`;
    res += `장비명 : ${equipment}\n`;
    res += `주소 : ${pData.addr || "(미선택)"}\n`;
    res += `담당자 : ${pMgr}`;
    if (CONTACTS[pMgr]) res += ` (${CONTACTS[pMgr]})`;

    res += `\n\n[하차]\n`;
    res += `하차 : ${dFormattedName || "(미선택)"}\n`;
    res += `일시 : ${dTime}\n`;
    res += `장비명 : ${equipment}\n`;
    res += `주소 : ${dData.addr || "(미선택)"}\n`;
    res += `담당자 : ${dMgr}`;
    if (CONTACTS[dMgr]) res += ` (${CONTACTS[dMgr]})`;

    if (memo) {
        res += `\n\n[비고]\n${memo}`;
    }

    document.getElementById("output").value = res;
}

function copyResult() {
    const area = document.getElementById("output");
    if (!area.value) return;
    area.select();
    document.execCommand('copy');
    
    const btn = document.getElementById("copy_btn");
    btn.innerText = "✅ 복사 완료!";
    btn.style.background = "#10b981";
    setTimeout(() => { 
        btn.innerText = "📋 클립보드 복사"; 
        btn.style.background = "rgba(255,255,255,0.1)";
    }, 2000);
}

document.addEventListener("DOMContentLoaded", () => {
    setupSearch("p", pData);
    setupSearch("d", dData);
    
    document.getElementById("p_mgr").addEventListener("input", () => syncPhoneHint("p"));
    document.getElementById("d_mgr").addEventListener("input", () => syncPhoneHint("d"));
    
    document.addEventListener("click", (e) => {
        if (!e.target.closest(".input-block")) {
            document.querySelectorAll(".search-suggest").forEach(el => el.classList.remove("active"));
        }
    });
});
</script>

</body>
</html>
